<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Mon Carnet</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F5F0;--card:#FFFFFF;--sur:#EDEBE4;--bdr:#E0DBD3;
  --ink:#17150F;--k2:#58524A;--k3:#A5A098;
  --ac:#1E5C3A;--al:#DCF0E6;--ad:#133D26;--am:#2A7A50;
  --gold:#B8922A;--red:#C0392B;
  --sh:0 2px 14px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.04);
  --sh2:0 8px 32px rgba(0,0,0,.13);
  --r:18px;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  --nav:62px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
/* TOPBAR */
#tb{flex-shrink:0;background:var(--card);border-bottom:1px solid var(--bdr);padding:calc(var(--st)+11px) 18px 11px;display:flex;align-items:center;gap:10px;z-index:20}
.ttl{font-family:'Lora',serif;font-size:21px;font-weight:400;flex:1}
.ttl em{font-style:italic;color:var(--ac)}
.ic-btn{width:36px;height:36px;border-radius:10px;border:none;background:var(--sur);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;flex-shrink:0;transition:background .15s}
.ic-btn:active{background:var(--bdr)}
.sync-badge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;background:var(--al);color:var(--ad);flex-shrink:0;letter-spacing:.02em}
.sync-badge.sy{background:#FFF4E0;color:#8B6200}
.sync-badge.er{background:#FDECEA;color:var(--red)}
.sync-badge.of{background:var(--sur);color:var(--k3)}
/* CONTENT + NAV */
#ct{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
#bn{flex-shrink:0;background:var(--card);border-top:1px solid var(--bdr);display:flex;height:calc(var(--nav) + var(--sb));padding-bottom:var(--sb);z-index:20}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;border:none;background:none;font-family:'Inter',sans-serif;color:var(--k3);font-size:10px;font-weight:600;letter-spacing:.02em;-webkit-tap-highlight-color:transparent;position:relative;transition:color .15s}
.tab.on{color:var(--ac)}
.tab-ic{font-size:22px;line-height:1}
.tab.on::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:24px;height:3px;background:var(--ac);border-radius:2px 2px 0 0}
/* SEARCH */
.sw{padding:14px 16px 10px}
.sr{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--bdr);border-radius:14px;padding:11px 15px;box-shadow:var(--sh)}
.sr svg{flex-shrink:0;opacity:.35}
.sr input{border:none;outline:none;font-size:15px;font-family:'Inter',sans-serif;color:var(--ink);background:transparent;width:100%}
.sr input::placeholder{color:var(--k3)}
/* CAT CIRCLES */
.cscroll{padding:6px 16px 12px;display:flex;gap:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;border-bottom:1px solid var(--bdr)}
.cscroll::-webkit-scrollbar{display:none}
.citem{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;cursor:pointer;-webkit-tap-highlight-color:transparent}
.ccircle{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;border:2.5px solid transparent;background:var(--sur);transition:all .18s}
.citem.on .ccircle{box-shadow:0 0 0 3px var(--al)}
.clabel{font-size:10px;font-weight:700;color:var(--k3);white-space:nowrap;letter-spacing:.03em}
.citem.on .clabel{color:var(--ac)}
/* TAG ROW */
.trow{padding:8px 16px 12px;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;border-bottom:1px solid var(--bdr)}
.trow::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 15px;border-radius:20px;border:1.5px solid var(--bdr);background:var(--card);font-size:12px;font-weight:600;font-family:'Inter',sans-serif;color:var(--k2);cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;transition:all .15s}
.chip.on{background:var(--ink);border-color:var(--ink);color:#fff}
/* RECIPE CARDS */
.rgrid{padding:14px 16px 90px;display:flex;flex-direction:column;gap:14px;max-width:640px;margin:0 auto}
.rcard{background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .15s,box-shadow .15s}
.rcard:active{transform:scale(.97);box-shadow:var(--sh2)}
.rhead{padding:20px 16px 16px;position:relative;min-height:92px;display:flex;flex-direction:column;justify-content:flex-end}
.rhead-em{position:absolute;top:16px;right:16px;font-size:32px;opacity:.7}
.rhead-cat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:rgba(255,255,255,.6);margin-bottom:5px}
.rhead-name{font-family:'Lora',serif;font-size:18px;color:#fff;line-height:1.25}
.rhead-name em{font-style:italic}
.rbody{padding:12px 16px 14px}
.rmeta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:9px}
.rmp{font-size:11px;font-weight:600;color:var(--k2)}
.rms{color:var(--bdr);font-size:13px}
.rfoot{display:flex;align-items:center;justify-content:space-between}
.rbadges{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.bstar{font-size:13px;color:var(--gold)}
.btested{font-size:11px;background:var(--al);color:var(--ad);padding:3px 10px;border-radius:20px;font-weight:700}
.blf{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.rarrow{font-size:20px;color:var(--k3)}
/* EMPTY */
.empty{text-align:center;padding:64px 24px}
.empty-ic{font-size:48px;margin-bottom:16px}
.empty-tx{font-family:'Lora',serif;font-size:21px;color:var(--k2);font-style:italic}
/* HERO */
.hero{padding:calc(var(--st)+14px) 18px 24px;min-height:220px;display:flex;flex-direction:column;justify-content:flex-end}
.hero-acts{display:flex;gap:8px;margin-bottom:auto;padding-bottom:20px;flex-wrap:wrap}
.hbtn{padding:8px 14px;border-radius:22px;border:none;background:rgba(255,255,255,.22);backdrop-filter:blur(8px);color:#fff;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;-webkit-tap-highlight-color:transparent}
.hcat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:rgba(255,255,255,.6);margin-bottom:7px}
.htitle{font-family:'Lora',serif;font-size:30px;color:#fff;line-height:1.15;margin-bottom:9px}
.htitle em{font-style:italic}
.hdesc{font-size:13px;color:rgba(255,255,255,.76);line-height:1.7;font-weight:300;margin-bottom:12px}
.hrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.srow{display:flex;gap:4px}
.star{font-size:24px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.htt{padding:7px 16px;border-radius:22px;border:none;background:rgba(255,255,255,.18);font-size:13px;font-weight:700;font-family:'Inter',sans-serif;color:#fff;cursor:pointer}
.htt.on{background:#fff;color:var(--ad)}
.hlf{font-size:12px;font-weight:700;padding:5px 13px;border-radius:22px;background:rgba(255,255,255,.2);color:#fff}
/* SECTIONS */
.sh{padding:18px 18px 8px;font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:var(--k3);font-weight:800}
.tdetail{padding:10px 18px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--bdr)}
.tpill{font-size:12px;background:var(--al);color:var(--ad);padding:5px 12px;border-radius:20px;font-weight:600}
/* META STRIP */
.mstrip{display:flex;border-bottom:1px solid var(--bdr);background:var(--sur)}
.mcell{flex:1;padding:14px 0;text-align:center;border-right:1px solid var(--bdr)}
.mcell:last-child{border-right:none}
.mval{display:block;font-family:'Lora',serif;font-size:19px}
.mlbl{display:block;font-size:9px;color:var(--k3);text-transform:uppercase;letter-spacing:.13em;margin-top:3px;font-weight:700}
/* MACROS */
.macrow{display:flex;margin:0 18px;background:var(--sur);border-radius:14px;overflow:hidden;border:1px solid var(--bdr)}
.maccell{flex:1;padding:13px 0;text-align:center;border-right:1px solid var(--bdr)}
.maccell:last-child{border-right:none}
.macval{display:block;font-family:'Lora',serif;font-size:18px}
.maclbl{display:block;font-size:9px;color:var(--k3);text-transform:uppercase;letter-spacing:.1em;margin-top:3px;font-weight:700}
/* RELATED */
.relrow{padding:0 18px 6px;display:flex;gap:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.relrow::-webkit-scrollbar{display:none}
.relcard{flex-shrink:0;width:126px;background:var(--card);border-radius:14px;box-shadow:var(--sh);overflow:hidden;cursor:pointer;-webkit-tap-highlight-color:transparent}
.relcard:active{opacity:.8}
.relband{height:48px;display:flex;align-items:center;justify-content:center;font-size:26px}
.relbody{padding:8px 10px 10px}
.relcat{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--k3);font-weight:700}
.relname{font-size:12px;font-weight:600;line-height:1.35;margin-top:3px;color:var(--ink)}
/* PORTIONS */
.porbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--bdr)}
.porlbl{font-size:14px;font-weight:500;color:var(--k2)}
.porstepper{display:flex;align-items:center;gap:16px}
.porbtn{width:38px;height:38px;border-radius:50%;border:2px solid var(--ac);background:var(--card);font-size:22px;cursor:pointer;color:var(--ac);font-weight:700;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.porbtn:active{transform:scale(.88)}
.porval{font-family:'Lora',serif;font-size:26px;min-width:34px;text-align:center}
/* INGREDIENTS */
.inglist{padding:0 18px 10px}
.ingrow{display:flex;align-items:baseline;gap:12px;padding:10px 0;border-bottom:1px solid var(--bdr)}
.ingrow:last-child{border-bottom:none}
.ingqty{font-family:'Lora',serif;font-size:16px;min-width:62px;text-align:right;flex-shrink:0}
.ingunit{font-size:11px;color:var(--k3);margin-left:2px}
.ingname{font-size:14px;flex:1}
.ingbadge{font-size:10px;color:var(--gold);background:#FFF8ED;padding:3px 9px;border-radius:8px;font-weight:700}
.atsbtn{margin:6px 18px 4px;width:calc(100% - 36px);padding:12px;border:1.5px dashed var(--bdr);border-radius:12px;background:none;font-size:13px;color:var(--k3);cursor:pointer;font-family:'Inter',sans-serif;font-weight:600}
.atsbtn:active{color:var(--ac);border-color:var(--ac)}
/* RATIO */
.ratiowrap{padding:6px 18px 8px}
.ratiobar{background:var(--sur);border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:12px;border:1px solid var(--bdr)}
.ratiolbl{font-size:11px;color:var(--k2);white-space:nowrap;font-weight:600}
.ratiotrack{flex:1;height:6px;background:var(--bdr);border-radius:3px;overflow:hidden;display:flex}
/* STEPS */
.stepslist{padding:0 18px;display:flex;flex-direction:column;gap:12px}
.sc{border-radius:16px;overflow:hidden;background:var(--card);box-shadow:var(--sh);transition:box-shadow .2s}
.sc.run{box-shadow:0 0 0 2.5px var(--ac),var(--sh)}
.sc.done{background:var(--al);box-shadow:none}
.spg{height:3px;background:var(--bdr)}
.spgf{height:100%;background:var(--ac);width:0;transition:width 1s linear}
.sc.done .spgf{width:100%!important}
.si2{padding:16px 16px 10px}
.stop{display:flex;align-items:flex-start;gap:12px;margin-bottom:8px}
.snum{width:26px;height:26px;border-radius:50%;background:var(--sur);font-size:11px;font-weight:800;color:var(--k2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.sc.done .snum{background:var(--ac);color:#fff}
.stitle{flex:1;font-size:14px;font-weight:700;line-height:1.35;padding-top:3px}
.sacts{display:flex;align-items:center;gap:6px;flex-shrink:0}
.sdesc{font-size:13px;color:var(--k2);line-height:1.75;font-weight:300;padding-left:38px}
.sbot{padding:6px 16px 12px 54px}
.ntog{font-size:11px;color:var(--k3);cursor:pointer;background:none;border:none;font-family:'Inter',sans-serif;font-weight:600;padding:0}
.ntog.has{color:var(--gold)}
.nzone{display:none;border-top:1px solid var(--bdr);padding:12px 16px 12px 54px;background:var(--sur)}
.nzone.open{display:block}
.nentry{display:flex;gap:9px;align-items:flex-start;margin-bottom:8px}
.ndate{font-size:10px;color:var(--k3);white-space:nowrap;flex-shrink:0;padding-top:2px;font-weight:600}
.ntext{font-size:12px;color:var(--k2);flex:1;line-height:1.55}
.ndel{background:none;border:none;color:var(--k3);cursor:pointer;font-size:14px;padding:0 2px}
.nadd{display:flex;gap:8px;margin-top:6px}
.ninput{flex:1;border:1.5px solid var(--bdr);border-radius:10px;padding:9px 12px;font-size:13px;font-family:'Inter',sans-serif;background:#fff;color:var(--ink);outline:none;-webkit-appearance:none}
.ninput::placeholder{color:var(--k3)}
.nsave{padding:9px 15px;background:var(--ink);color:#fff;border:none;border-radius:10px;font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;font-weight:700}
.ib{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--bdr);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--k2);flex-shrink:0;-webkit-tap-highlight-color:transparent}
.ib:active{transform:scale(.88)}
.ib.pr{background:var(--ink);border-color:var(--ink);color:#fff}
.ib.ru{background:var(--ac);border-color:var(--ac);color:#fff}
.ib.dn{background:var(--ac);border-color:var(--ac);color:#fff}
.tw{display:flex;align-items:center;gap:5px}
.tv{font-size:12px;font-weight:700;color:var(--k3);min-width:38px;text-align:right;font-variant-numeric:tabular-nums}
.tv.ru{color:var(--ac)}.tv.dn{color:var(--ac)}
/* NOTES / JOURNAL */
.nblock,.jblock{margin:0 18px;background:var(--sur);border-radius:16px;padding:18px;border:1px solid var(--bdr)}
.btitle{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--k3);margin-bottom:12px;font-weight:800}
.nrow{font-size:13px;color:var(--k2);line-height:1.7;padding-left:18px;position:relative;margin-bottom:7px;font-weight:300}
.nrow::before{content:'→';position:absolute;left:0;color:var(--ac);font-weight:700}
.jta{width:100%;min-height:72px;border:1.5px solid var(--bdr);border-radius:12px;padding:11px 14px;font-size:13px;font-family:'Inter',sans-serif;color:var(--ink);background:#fff;resize:none;outline:none;-webkit-appearance:none}
.jta::placeholder{color:var(--k3)}
.jacts{display:flex;gap:9px;margin-top:10px}
.jsave{flex:1;padding:11px;background:var(--ink);color:#fff;border:none;border-radius:12px;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;font-weight:700}
.jphoto{padding:11px 16px;background:none;border:1.5px solid var(--bdr);border-radius:12px;font-size:15px;cursor:pointer}
.jentries{margin-top:12px}
.jentry{display:flex;gap:9px;align-items:flex-start;padding:11px 0;border-top:1px solid var(--bdr)}
.jdate{font-size:10px;color:var(--k3);white-space:nowrap;flex-shrink:0;padding-top:2px;font-weight:700}
.jbody{flex:1}
.jtext{font-size:13px;color:var(--k2);line-height:1.55}
.jimg{width:80px;height:80px;object-fit:cover;border-radius:12px;margin-top:8px;display:block}
.jdel{background:none;border:none;color:var(--k3);cursor:pointer;font-size:16px;flex-shrink:0}
/* PLANNER */
.pw{max-width:640px;margin:0 auto;padding-bottom:28px}
.wknav{display:flex;align-items:center;padding:16px 18px;border-bottom:1px solid var(--bdr);gap:10px}
.wklbl{flex:1;text-align:center;font-size:14px;font-weight:700}
.wkbtn{padding:8px 16px;border:1.5px solid var(--bdr);border-radius:12px;background:var(--card);font-size:13px;font-family:'Inter',sans-serif;color:var(--k2);cursor:pointer;font-weight:600}
.genshop{margin:16px 18px 0;width:calc(100% - 36px);padding:14px;background:var(--ac);color:#fff;border:none;border-radius:16px;font-size:15px;font-family:'Inter',sans-serif;cursor:pointer;font-weight:800;box-shadow:0 4px 14px rgba(30,92,58,.3)}
.daybk{border-bottom:1px solid var(--bdr)}
.dayhd{padding:13px 18px 7px;display:flex;align-items:center;gap:9px}
.dayname{font-size:14px;font-weight:800}
.daydate{font-size:12px;color:var(--k3);font-weight:500}
.dayslots{padding:0 18px 13px;display:flex;flex-direction:column;gap:8px}
.slot{display:flex;align-items:center;gap:12px;padding:11px 16px;border-radius:14px;background:var(--sur);cursor:pointer;-webkit-tap-highlight-color:transparent;border:1px solid transparent;transition:all .15s}
.slot.f{background:var(--card);box-shadow:var(--sh);border-color:var(--bdr)}
.slotlbl{font-size:11px;color:var(--k3);min-width:40px;text-transform:uppercase;letter-spacing:.07em;font-weight:700}
.slotcnt{flex:1;font-size:13px;color:var(--k3)}
.slot.f .slotcnt{color:var(--ink);font-weight:600}
.slotx{background:none;border:none;color:var(--k3);font-size:18px;cursor:pointer;padding:0 3px}
/* SHOPPING */
.shopwrap{max-width:640px;margin:0 auto;padding-bottom:28px}
.shopacts{display:flex;gap:9px;padding:14px 18px;border-bottom:1px solid var(--bdr);flex-wrap:wrap}
.shopbtn{padding:9px 15px;border-radius:12px;border:1.5px solid var(--bdr);background:var(--card);font-size:12px;font-family:'Inter',sans-serif;color:var(--k2);cursor:pointer;white-space:nowrap;font-weight:700}
.shopbtn.p{background:var(--ac);border-color:var(--ac);color:#fff;box-shadow:0 3px 10px rgba(30,92,58,.25)}
.shopadd{display:flex;gap:9px;padding:13px 18px;border-bottom:1px solid var(--bdr)}
.shopinput{flex:1;border:1.5px solid var(--bdr);border-radius:14px;padding:11px 15px;font-size:14px;font-family:'Inter',sans-serif;color:var(--ink);background:var(--card);outline:none;-webkit-appearance:none}
.shopinput::placeholder{color:var(--k3)}
.shopaddbn{padding:11px 20px;background:var(--ac);color:#fff;border:none;border-radius:14px;font-size:14px;font-family:'Inter',sans-serif;cursor:pointer;font-weight:800}
.shopgrp{padding:13px 18px 5px;font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:var(--k3);font-weight:800}
.shopitem{display:flex;align-items:center;gap:14px;padding:13px 18px;border-top:1px solid var(--bdr)}
.shopchk{width:26px;height:26px;border-radius:50%;border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent;cursor:pointer;flex-shrink:0;font-weight:800;transition:all .15s}
.shopchk.done{background:var(--ac);border-color:var(--ac);color:#fff}
.shopname{flex:1;font-size:15px}.shopname.done{text-decoration:line-through;color:var(--k3)}
.shopqty{font-size:12px;color:var(--k3);white-space:nowrap;font-weight:600}
.shopdel{background:none;border:none;color:var(--k3);font-size:19px;cursor:pointer}
.shopempty{padding:60px 24px;text-align:center;color:var(--k3);font-size:15px}
/* ADD FORM */
.addwrap{max-width:640px;margin:0 auto;padding:18px 18px 100px}
.impblk{background:var(--al);border-radius:18px;padding:18px;margin-bottom:24px;border:1.5px solid rgba(30,92,58,.2)}
.imptitle{font-size:15px;font-weight:800;color:var(--ad);margin-bottom:10px}
.impta{width:100%;min-height:88px;border:1.5px solid rgba(30,92,58,.22);border-radius:12px;padding:11px 14px;font-size:13px;font-family:'Inter',sans-serif;color:var(--ink);background:#fff;resize:vertical;outline:none;-webkit-appearance:none}
.impta::placeholder{color:var(--k3)}
.impbtn{width:100%;padding:12px;background:var(--ac);color:#fff;border:none;border-radius:12px;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;font-weight:800;margin-top:10px}
.impst{font-size:12px;color:var(--ad);text-align:center;padding:7px 0;font-weight:600}
.impst.err{color:var(--red)}
.fg{margin-bottom:16px}
