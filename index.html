<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Mon Carnet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F2F2F7;
  --card: #FFFFFF;
  --sur: #FAFAFC;
  --bdr: rgba(0,0,0,.07);
  --ink: #1C1C1E;
  --k2: #48484A;
  --k3: #8E8E93;
  --ac: #16A34A;
  --al: #F0FDF4;
  --ad: #15803D;
  --red: #FF3B30;
  --gold: #F59E0B;
  --sh: 0 2px 12px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04);
  --sh2: 0 8px 24px rgba(0,0,0,.1);
  --r: 16px;
  --st: env(safe-area-inset-top, 0px);
  --sb: env(safe-area-inset-bottom, 0px);
  --nav: 60px;
}
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

/* TOPBAR */
#tb { flex-shrink: 0; background: var(--bg); padding: calc(var(--st)+24px) 20px 20px; display: flex; align-items: center; gap: 10px; z-index: 20; }
.ttl { font-family: 'Inter', sans-serif; font-size: 28px; font-weight: 800; flex: 1; letter-spacing: -.03em; text-align: center; color: var(--ac); }
.ttl em { font-style: normal; }
.sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--k3); flex-shrink: 0; }
.sync-dot.ok { background: var(--ac); }
.sync-dot.sy { background: var(--gold); }
.sync-dot.er { background: var(--red); }
.hd-btn { width: 34px; height: 34px; border-radius: 10px; border: none; background: var(--card); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--k2); box-shadow: var(--sh); flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
.hd-btn:active { opacity: .7; }

/* CONTENT + NAV */
#ct { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
#bn { flex-shrink: 0; background: var(--card); border-top: 1px solid var(--bdr); display: flex; height: calc(var(--nav) + var(--sb)); padding-bottom: var(--sb); z-index: 20; }
.tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; border: none; background: none; font-family: 'Inter', sans-serif; color: var(--k3); font-size: 10px; font-weight: 600; letter-spacing: .02em; -webkit-tap-highlight-color: transparent; transition: color .15s; }
.tab:active { opacity: .6; }
.tab.on { color: var(--ac); }

/* SEARCH */
.sw { padding: 16px 20px 16px; }
.sr { display: flex; align-items: center; gap: 10px; background: var(--card); border-radius: 14px; padding: 12px 16px; box-shadow: var(--sh); }
.sr svg { flex-shrink: 0; color: var(--k3); }
.sr input { border: none; outline: none; font-size: 15px; font-family: 'Inter', sans-serif; color: var(--ink); background: transparent; width: 100%; }
.sr input::placeholder { color: var(--k3); }

/* SECTION HEADER */
.section-title { padding: 16px 20px 10px; font-size: 19px; font-weight: 700; letter-spacing: -.02em; }
.section-sub { padding: 0 20px 10px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--k3); }

/* CATEGORY CHIPS */
.cat-scroll { padding: 4px 20px 16px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
.cat-scroll::-webkit-scrollbar { display: none; }
.cat-chip { flex-shrink: 0; display: flex; align-items: center; gap: 7px; padding: 8px 14px; border-radius: 100px; background: var(--card); border: 1.5px solid transparent; font-size: 13px; font-weight: 600; color: var(--k2); cursor: pointer; -webkit-tap-highlight-color: transparent; box-shadow: var(--sh); transition: all .15s; }
.cat-chip .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.cat-chip.on { background: var(--ink); color: #fff; border-color: var(--ink); }
.cat-chip.on .cat-dot { background: #fff !important; }

/* TAG CHIPS */
.tag-row { padding: 0 20px 16px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
.tag-row::-webkit-scrollbar { display: none; }
.tag-chip { flex-shrink: 0; padding: 6px 13px; border-radius: 100px; background: var(--card); border: 1.5px solid var(--bdr); font-size: 12px; font-weight: 600; color: var(--k3); cursor: pointer; -webkit-tap-highlight-color: transparent; transition: all .15s; }
.tag-chip.on { background: var(--ink); border-color: var(--ink); color: #fff; }

/* RECIPE LIST */
.recipe-list { padding: 0 20px 80px; display: flex; flex-direction: column; gap: 10px; }
.rcard { background: var(--card); border-radius: var(--r); overflow: hidden; display: flex; align-items: stretch; box-shadow: var(--sh); cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform .12s; }
.rcard:active { transform: scale(.98); }
.rcard-strip { width: 4px; flex-shrink: 0; }
.rcard-body { flex: 1; padding: 14px 12px; min-width: 0; }
.rcard-name { font-size: 15px; font-weight: 600; color: var(--ink); letter-spacing: -.01em; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rcard-name em { font-style: italic; color: var(--ac); }
.rcard-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.rcard-meta-item { font-size: 12px; color: var(--k3); display: flex; align-items: center; gap: 3px; }
.rcard-meta-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--k3); }
.rcard-badges { display: flex; align-items: center; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.pill { font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 100px; }
.pill-green { background: var(--al); color: var(--ad); }
.pill-gold { background: #FFF8EC; color: #B45309; }
.pill-gray { background: var(--bg); color: var(--k3); }
.rcard-arrow { padding: 14px 16px; display: flex; align-items: center; color: var(--k3); flex-shrink: 0; }
.empty-state { text-align: center; padding: 60px 24px; }
.empty-ic { width: 64px; height: 64px; border-radius: 20px; background: var(--card); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; box-shadow: var(--sh); color: var(--k3); }
.empty-tx { font-size: 17px; font-weight: 600; color: var(--k2); margin-bottom: 6px; }
.empty-sub { font-size: 14px; color: var(--k3); }

/* DETAIL */
.detail-wrap { padding-bottom: 40px; }
.detail-nav { display: flex; align-items: center; gap: 8px; padding: calc(var(--st)+14px) 20px 6px; }
.back-btn { width: 38px; height: 38px; border-radius: 12px; border: none; background: var(--card); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink); box-shadow: var(--sh); -webkit-tap-highlight-color: transparent; flex-shrink: 0; }
.back-btn:active { opacity: .7; }
.detail-nav-actions { margin-left: auto; display: flex; gap: 8px; }
.detail-header { padding: 8px 20px 20px; }
.detail-cat { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 700; color: var(--ac); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
.detail-cat-dot { width: 6px; height: 6px; border-radius: 50%; }
.detail-title { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 800; letter-spacing: -.02em; line-height: 1.2; margin-bottom: 10px; }
.detail-title em { font-style: normal; }
.detail-desc { font-size: 14px; color: var(--k2); line-height: 1.65; font-weight: 400; margin-bottom: 16px; }
.detail-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.star-row { display: flex; gap: 4px; }
.star { font-size: 20px; color: #D1D1D6; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: color .1s; }
.star.on { color: var(--gold); }
.tested-btn { padding: 6px 14px; border-radius: 100px; border: 1.5px solid var(--bdr); background: var(--card); font-size: 12px; font-weight: 700; color: var(--k3); cursor: pointer; font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 5px; transition: all .15s; }
.tested-btn.on { background: var(--al); border-color: var(--ad); color: var(--ad); }
.lf-badge { padding: 5px 12px; border-radius: 100px; font-size: 11px; font-weight: 700; }

/* META GRID */
.meta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 20px 20px; }
.meta-card { background: var(--card); border-radius: 14px; padding: 14px 12px; display: flex; flex-direction: column; align-items: center; gap: 5px; box-shadow: var(--sh); }
.meta-icon { color: var(--ac); }
.meta-val { font-family: 'Lora', serif; font-size: 18px; font-weight: 600; }
.meta-lbl { font-size: 10px; font-weight: 700; color: var(--k3); text-transform: uppercase; letter-spacing: .08em; }

/* MACROS */
.macros-row { display: flex; margin: 0 20px 20px; background: var(--card); border-radius: 14px; overflow: hidden; box-shadow: var(--sh); }
.mac-cell { flex: 1; padding: 14px 0; text-align: center; border-right: 1px solid var(--bdr); }
.mac-cell:last-child { border-right: none; }
.mac-val { display: block; font-family: 'Lora', serif; font-size: 18px; font-weight: 600; }
.mac-lbl { display: block; font-size: 9px; font-weight: 700; color: var(--k3); text-transform: uppercase; letter-spacing: .1em; margin-top: 2px; }

/* SECTION */
.sec-head { padding: 4px 20px 10px; font-size: 12px; font-weight: 700; color: var(--k3); text-transform: uppercase; letter-spacing: .08em; display: flex; align-items: center; gap: 8px; }
.sec-head::after { content: ''; flex: 1; height: 1px; background: var(--bdr); }
.tags-strip { padding: 0 20px 16px; display: flex; gap: 7px; flex-wrap: wrap; }
.tag-pill { font-size: 12px; background: var(--al); color: var(--ad); padding: 4px 11px; border-radius: 100px; font-weight: 600; }

/* RELATED */
.related-scroll { padding: 0 20px 16px; display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
.related-scroll::-webkit-scrollbar { display: none; }
.related-card { flex-shrink: 0; background: var(--card); border-radius: 14px; overflow: hidden; cursor: pointer; box-shadow: var(--sh); width: 130px; -webkit-tap-highlight-color: transparent; }
.related-card:active { opacity: .8; }
.related-top { height: 6px; }
.related-body { padding: 10px 12px 12px; }
.related-cat { font-size: 9px; font-weight: 700; color: var(--k3); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 4px; }
.related-name { font-size: 13px; font-weight: 600; color: var(--ink); line-height: 1.3; }

/* PORTIONS */
.portions-bar { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: var(--card); margin: 0 0 1px; }
.portions-label { font-size: 14px; font-weight: 500; color: var(--k2); }
.portions-ctrl { display: flex; align-items: center; gap: 16px; }
.por-btn { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--ac); background: var(--card); color: var(--ac); font-size: 20px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
.por-btn:active { background: var(--al); }
.por-val { font-family: 'Lora', serif; font-size: 24px; min-width: 34px; text-align: center; }

/* INGREDIENTS */
.ing-list { background: var(--card); margin: 0 0 20px; }
.ing-row { display: flex; align-items: baseline; gap: 12px; padding: 12px 20px; border-bottom: 1px solid var(--bdr); }
.ing-row:last-child { border-bottom: none; }
.ing-qty { font-family: 'Lora', serif; font-size: 15px; min-width: 64px; text-align: right; flex-shrink: 0; }
.ing-unit { font-size: 11px; color: var(--k3); margin-left: 2px; }
.ing-name { font-size: 14px; flex: 1; }
.ing-badge { font-size: 10px; color: var(--gold); background: #FFFBEB; padding: 2px 8px; border-radius: 8px; font-weight: 700; }
.add-shop-btn { margin: 0 20px 20px; width: calc(100% - 40px); padding: 12px; border: 1.5px solid var(--bdr); border-radius: 12px; background: none; font-size: 13px; color: var(--k3); cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 7px; transition: all .15s; }
.add-shop-btn:active { border-color: var(--ac); color: var(--ac); }

/* RATIO */
.ratio-wrap { padding: 0 20px 16px; }
.ratio-bar { background: var(--card); border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; gap: 12px; box-shadow: var(--sh); }
.ratio-lbl { font-size: 11px; color: var(--k2); font-weight: 600; white-space: nowrap; }
.ratio-track { flex: 1; height: 6px; background: var(--bdr); border-radius: 3px; overflow: hidden; display: flex; }

/* STEPS */
.steps-list { padding: 0 20px 8px; display: flex; flex-direction: column; gap: 10px; }
.step-card { background: var(--card); border-radius: var(--r); overflow: hidden; box-shadow: var(--sh); transition: box-shadow .2s; }
.step-card.run { box-shadow: 0 0 0 2px var(--ac), var(--sh); }
.step-card.done { background: var(--al); box-shadow: none; }
.step-prog { height: 2px; background: var(--bdr); }
.step-prog-fill { height: 100%; background: var(--ac); width: 0; transition: width 1s linear; }
.step-card.done .step-prog-fill { width: 100% !important; }
.step-inner { padding: 14px 16px 10px; }
.step-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
.step-num { width: 24px; height: 24px; border-radius: 50%; background: var(--bg); font-size: 11px; font-weight: 800; color: var(--k2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
.step-card.done .step-num { background: var(--ac); color: #fff; }
.step-title { flex: 1; font-size: 14px; font-weight: 700; line-height: 1.3; padding-top: 3px; }
.step-acts { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.step-desc { font-size: 13px; color: var(--k2); line-height: 1.75; padding-left: 36px; }
.step-bottom { padding: 6px 16px 12px 52px; }
.note-tog { font-size: 11px; color: var(--k3); cursor: pointer; background: none; border: none; font-family: 'Inter', sans-serif; font-weight: 600; padding: 0; display: flex; align-items: center; gap: 4px; }
.note-tog.has { color: var(--gold); }
.step-notes { display: none; border-top: 1px solid var(--bdr); padding: 12px 16px 12px 52px; background: var(--bg); }
.step-notes.open { display: block; }
.note-entry { display: flex; gap: 9px; align-items: flex-start; margin-bottom: 8px; }
.note-date { font-size: 10px; color: var(--k3); white-space: nowrap; flex-shrink: 0; padding-top: 2px; font-weight: 600; }
.note-text { font-size: 12px; color: var(--k2); flex: 1; line-height: 1.5; }
.note-del { background: none; border: none; color: var(--k3); cursor: pointer; padding: 0 2px; display: flex; align-items: center; }
.note-add { display: flex; gap: 7px; margin-top: 6px; }
.note-input { flex: 1; border: 1.5px solid var(--bdr); border-radius: 10px; padding: 8px 12px; font-size: 13px; font-family: 'Inter', sans-serif; color: var(--ink); background: var(--card); outline: none; -webkit-appearance: none; }
.note-input::placeholder { color: var(--k3); }
.note-save { padding: 8px 14px; background: var(--ink); color: #fff; border: none; border-radius: 10px; font-size: 12px; font-family: 'Inter', sans-serif; cursor: pointer; font-weight: 700; }
.ib { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--bdr); background: var(--card); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--k2); flex-shrink: 0; -webkit-tap-highlight-color: transparent; box-shadow: var(--sh); }
.ib:active { transform: scale(.88); }
.ib.pr { background: var(--ink); border-color: var(--ink); color: #fff; }
.ib.ru { background: var(--ac); border-color: var(--ac); color: #fff; }
.ib.dn { background: var(--ac); border-color: var(--ac); color: #fff; }
.tw { display: flex; align-items: center; gap: 5px; }
.tv { font-size: 12px; font-weight: 700; color: var(--k3); min-width: 36px; text-align: right; font-variant-numeric: tabular-nums; }
.tv.ru { color: var(--ac); } .tv.dn { color: var(--ac); }

/* NOTES / JOURNAL */
.notes-block, .journal-block { margin: 0 20px 20px; background: var(--card); border-radius: var(--r); overflow: hidden; box-shadow: var(--sh); }
.block-hd { padding: 14px 16px 12px; border-bottom: 1px solid var(--bdr); }
.block-title { font-size: 13px; font-weight: 700; color: var(--ink); }
.note-row { padding: 11px 16px; border-bottom: 1px solid var(--bdr); font-size: 13px; color: var(--k2); line-height: 1.65; position: relative; padding-left: 28px; }
.note-row::before { content: ''; position: absolute; left: 16px; top: 18px; width: 5px; height: 5px; border-radius: 50%; background: var(--ac); }
.note-row:last-child { border-bottom: none; }
.jta { width: 100%; min-height: 68px; border: none; border-bottom: 1px solid var(--bdr); padding: 12px 16px; font-size: 13px; font-family: 'Inter', sans-serif; color: var(--ink); background: transparent; resize: none; outline: none; -webkit-appearance: none; display: block; }
.jta::placeholder { color: var(--k3); }
.j-acts { display: flex; gap: 8px; padding: 10px 16px; }
.j-save { flex: 1; padding: 10px; background: var(--ink); color: #fff; border: none; border-radius: 10px; font-size: 13px; font-family: 'Inter', sans-serif; cursor: pointer; font-weight: 700; }
.j-photo-btn { padding: 10px 14px; background: none; border: 1.5px solid var(--bdr); border-radius: 10px; cursor: pointer; display: flex; align-items: center; color: var(--k3); }
.j-entries { }
.j-entry { display: flex; gap: 10px; align-items: flex-start; padding: 12px 16px; border-top: 1px solid var(--bdr); }
.j-date { font-size: 10px; color: var(--k3); white-space: nowrap; flex-shrink: 0; padding-top: 2px; font-weight: 700; }
.j-body { flex: 1; }
.j-text { font-size: 13px; color: var(--k2); line-height: 1.5; }
.j-photo { width: 72px; height: 72px; object-fit: cover; border-radius: 10px; margin-top: 6px; display: block; }
.j-del { background: none; border: none; color: var(--k3); cursor: pointer; padding: 0 2px; display: flex; align-items: center; flex-shrink: 0; }

/* PLANNER */
.planner-wrap { max-width: 640px; margin: 0 auto; padding-bottom: 80px; }
.week-nav { display: flex; align-items: center; padding: 12px 20px; gap: 12px; }
.week-label { flex: 1; text-align: center; font-size: 14px; font-weight: 700; }
.week-btn { padding: 8px 16px; border-radius: 100px; border: 1.5px solid var(--bdr); background: var(--card); font-size: 13px; font-family: 'Inter', sans-serif; color: var(--k2); cursor: pointer; font-weight: 600; box-shadow: var(--sh); }
.gen-shop-btn { margin: 0 20px 20px; width: calc(100% - 40px); padding: 14px; background: var(--ac); color: #fff; border: none; border-radius: var(--r); font-size: 15px; font-family: 'Inter', sans-serif; cursor: pointer; font-weight: 700; box-shadow: 0 4px 12px rgba(22,163,74,.3); }
.day-block { background: var(--card); border-radius: var(--r); margin: 0 20px 10px; overflow: hidden; box-shadow: var(--sh); }
.day-hd { padding: 13px 16px 9px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--bdr); }
.day-name { font-size: 14px; font-weight: 700; }
.day-date { font-size: 12px; color: var(--k3); margin-left: auto; font-weight: 500; }
.day-slots { padding: 8px 12px 12px; display: flex; flex-direction: column; gap: 7px; }
.slot { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 12px; background: var(--bg); cursor: pointer; -webkit-tap-highlight-color: transparent; transition: all .15s; }
.slot.f { background: var(--al); }
.slot-lbl { font-size: 11px; color: var(--k3); min-width: 38px; text-transform: uppercase; letter-spacing: .06em; font-weight: 700; }
.slot-content { flex: 1; font-size: 13px; color: var(--k3); }
.slot.f .slot-content { color: var(--ad); font-weight: 600; }
.slot-clear { background: none; border: none; color: var(--k3); font-size: 16px; cursor: pointer; padding: 0 2px; }

/* SHOPPING */
.shop-wrap { max-width: 640px; margin: 0 auto; padding-bottom: 80px; }
.shop-actions { display: flex; gap: 8px; padding: 8px 20px 14px; flex-wrap: wrap; }
.shop-btn { padding: 8px 14px; border-radius: 100px; border: 1.5px solid var(--bdr); background: var(--card); font-size: 12px; font-family: 'Inter', sans-serif; color: var(--k2); cursor: pointer; font-weight: 700; box-shadow: var(--sh); }
.shop-btn.p { background: var(--ac); border-color: var(--ac); color: #fff; }
.shop-add-row { display: flex; gap: 8px; padding: 0 20px 16px; }
.shop-input { flex: 1; border: none; border-radius: 14px; padding: 11px 16px; font-size: 14px; font-family: 'Inter', sans-serif; color: var(--ink); background: var(--card); outline: none; -webkit-appearance: none; box-shadow: var(--sh); }
.shop-input::placeholder { color: var(--k3); }
.shop-add-btn { padding: 11px 18px; background: var(--ink); color: #fff; border: none; border-radius: 14px; font-size: 14px; cursor: pointer; font-weight: 800; }
.shop-group-title { padding: 12px 20px 5px; font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--k3); font-weight: 700; }
.shop-group { background: var(--card); border-radius: var(--r); margin: 0 20px 10px; overflow: hidden; box-shadow: var(--sh); }
.shop-item { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border-top: 1px solid var(--bdr); }
.shop-item:first-child { border-top: none; }

// ── STEPS ──────────────────────────────────────────────────
function mkStep(rid,step,idx){
  const k=tk(rid,step.id),notes=SN[k]||[],done=SD[k]||false;
  const tH=step.timer?`<div class="tw"><span class="tv" id="td-${rid}-${step.id}">${fmt(step.timer)}</span><button class="ib pr" id="tb-${rid}-${step.id}" data-rid="${rid}" data-sid="${step.id}" data-tot="${step.timer}" onclick="startT(this.dataset.rid,this.dataset.sid,parseInt(this.dataset.tot))"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg></button><button class="ib" data-rid="${rid}" data-sid="${step.id}" data-tot="${step.timer}" onclick="resetT(this.dataset.rid,this.dataset.sid,parseInt(this.dataset.tot))"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg></button></div>`:'';
  return `<div class="step-card${done?' done':''}" id="card-${rid}-${step.id}">
    <div class="step-prog"><div class="step-prog-fill" id="tp-${rid}-${step.id}"></div></div>
    <div class="step-inner">
      <div class="step-top">
        <div class="step-num" id="snum-${rid}-${step.id}">${done?'✓':idx+1}</div>
        <div class="step-title">${step.t}</div>
        <div class="step-acts">${tH}<button class="ib${done?' dn':''}" id="chk-${rid}-${step.id}" data-rid="${rid}" data-sid="${step.id}" data-idx="${idx+1}" onclick="togSD(this.dataset.rid,this.dataset.sid,parseInt(this.dataset.idx))"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></button></div>
      </div>
      <div class="step-desc">${step.d}</div>
    </div>
    <div class="step-bottom">
      <button class="note-tog${notes.length?' has':''}" id="ntog-${rid}-${step.id}" data-rid="${rid}" data-sid="${step.id}" onclick="togN(this.dataset.rid,this.dataset.sid)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg> ${notes.length?notes.length+' note'+(notes.length>1?'s':''):'Note'}</button>
    </div>
    <div class="step-notes${notes.length?' open':''}" id="nzone-${rid}-${step.id}">
      <div id="nlist-${rid}-${step.id}">${notes.map((n,i)=>mkNEntry(rid,step.id,n,i)).join('')}</div>
      <div class="note-add"><input class="note-input" id="ninput-${rid}-${step.id}" placeholder="Ajouter une note…" data-rid="${rid}" data-sid="${step.id}" onkeydown="if(event.key==='Enter')addN(this.dataset.rid,this.dataset.sid,this)"><button class="note-save" data-rid="${rid}" data-sid="${step.id}" onclick="addN(this.dataset.rid,this.dataset.sid,$('ninput-'+this.dataset.rid+'-'+this.dataset.sid))">OK</button></div>
    </div>
  </div>`;
}
function mkNEntry(rid,sid,n,i){return `<div class="note-entry"><span class="note-date">${n.date}</span><span class="note-text">${n.text}</span><button class="note-del" data-rid="${rid}" data-sid="${sid}" data-i="${i}" onclick="delN(this.dataset.rid,this.dataset.sid,parseInt(this.dataset.i))"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></button></div>`;}


function togSD(rid,sid,num){const k=tk(rid,sid);SD[k]=!SD[k];scheduleSync();const c=$('card-'+rid+'-'+sid);c?.classList.toggle('done',SD[k]);const n=$('snum-'+rid+'-'+sid);if(n)n.textContent=SD[k]?'✓':num;const b=$('chk-'+rid+'-'+sid);if(b)b.className=SD[k]?'ib dn':'ib';}
function togN(rid,sid){$('nzone-'+rid+'-'+sid)?.classList.toggle('open');}
function addN(rid,sid,input){const text=input?.value.trim();if(!text)return;const k=tk(rid,sid);if(!SN[k])SN[k]=[];SN[k].push({text,date:today()});input.value='';scheduleSync();rfN(rid,sid);}
function delN(rid,sid,idx){SN[tk(rid,sid)].splice(idx,1);scheduleSync();rfN(rid,sid);}
function rfN(rid,sid){const k=tk(rid,sid),notes=SN[k]||[];const l=$('nlist-'+rid+'-'+sid);if(l)l.innerHTML=notes.map((n,i)=>mkNEntry(rid,sid,n,i)).join('');const tog=$('ntog-'+rid+'-'+sid);if(tog){tog.className='ntog'+(notes.length?' has':'');tog.innerHTML='💬 '+(notes.length?notes.length+' note'+(notes.length>1?'s':''):'Ajouter une note');}if(notes.length)$('nzone-'+rid+'-'+sid)?.classList.add('open');}
let pendJPRid=null;
function openJP(rid){pendJPRid=rid;$('jpi').click();}
function handleJP(input){const file=input.files?.[0];if(!file||!pendJPRid)return;const rid=pendJPRid;const reader=new FileReader();reader.onload=e=>addJE(rid,'',e.target.result);reader.readAsDataURL(file);input.value='';}
function addJ(rid){const ta=$('jta-'+rid);const text=ta?.value.trim();if(!text)return;addJE(rid,text,null);}
function addJE(rid,text,photo){if(!JN[rid])JN[rid]=[];JN[rid].push({text,date:today(),photo:photo||null});if($('jta-'+rid))$('jta-'+rid).value='';scheduleSync();renderJ(rid);}
function delJE(rid,idx){JN[rid].splice(idx,1);scheduleSync();renderJ(rid);}
function renderJ(rid){const el=$('jlist-'+rid);if(!el)return;el.innerHTML=(JN[rid]||[]).map((e,i)=>`<div class="jentry"><span class="jdate">${e.date}</span><div class="jbody">${e.text?`<div class="jtext">${e.text}</div>`:''}${e.photo?`<img src="${e.photo}" class="jph" loading="lazy">`:''}</div><button class="jdl" data-rid="${rid}" data-i="${i}" onclick="delJE(this.dataset.rid,parseInt(this.dataset.i))">×</button></div>`).join('');}
async function shareR(rid){const r=getR(rid);if(!r)return;const text=r.name+'\n\n'+(r.desc||'')+'\n\nIngrédients :\n'+(r.ingredients||[]).map(i=>'• '+(i.a||'')+(i.u?' '+i.u:'')+' '+i.n).join('\n');if(navigator.share)try{await navigator.share({title:r.name,text});return;}catch{}navigator.clipboard?.writeText(text).then(()=>alert('Recette copiée !'));}

// ── PERSISTENCE ───────────────────────────────────────────
const LS={load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}};
let CR=LS.load('cr6_r',[]);   // custom recipes
let TS=LS.load('cr6_t',{});   // tested
let RT=LS.load('cr6_rt',{});  // ratings
let SN=LS.load('cr6_sn',{});  // step notes
let JN=LS.load('cr6_jn',{});  // journal
let SD=LS.load('cr6_sd',{});  // step done
let PL=LS.load('cr6_pl',{});  // planner
let SH=LS.load('cr6_sh',[]);  // shopping
let MI=LS.load('cr6_mi',[]);  // manual items

function persist(){
  LS.save('cr6_r',CR);LS.save('cr6_t',TS);LS.save('cr6_rt',RT);LS.save('cr6_sn',SN);
  LS.save('cr6_jn',JN);LS.save('cr6_sd',SD);LS.save('cr6_pl',PL);LS.save('cr6_sh',SH);LS.save('cr6_mi',MI);
}
function allR(){return[...INIT,...CR].filter(r=>r&&r.id);}
function getR(id){return allR().find(r=>r.id===id);}

// ── GITHUB GIST SYNC ──────────────────────────────────────
// Token & Gist ID stored in localStorage — never in source code
let GH_TOKEN=localStorage.getItem('gh_token')||'';
let GH_GIST_ID=localStorage.getItem('gh_gist_id')||'';
let fbTimer=null;

function openFB(){
  const m=document.getElementById('fbm');
  if(!m)return;
  m.innerHTML=`<div class="gh-sheet">
    <div class="gh-title">🔗 GitHub Sync</div>
    <p class="gh-desc">Stocke tes données sur un Gist GitHub privé. Setup unique par appareil.</p>
    <div class="fg"><label class="fl">Personal Access Token</label>
      <input type="password" id="ghTok" class="fi" value="${GH_TOKEN}" placeholder="ghp_…"></div>
    <div class="fg"><label class="fl">Gist ID</label>
      <input type="text" id="ghGist" class="fi" value="${GH_GIST_ID}" placeholder="7a8b9c0d…"></div>
    <button class="submit-btn" onclick="saveGHCfg()">Activer la synchro</button>
    <button class="delete-btn" style="border-color:var(--k3);color:var(--k2)" onclick="closeFB()">Annuler</button>
  </div>`;
  m.classList.add('open');
}
function closeFB(){document.getElementById('fbm')?.classList.remove('open');}
function saveGHCfg(){
  const tok=document.getElementById('ghTok').value.trim();
  const gist=document.getElementById('ghGist').value.trim();
  if(!tok||!gist){alert('Remplis les deux champs.');return;}
  GH_TOKEN=tok;GH_GIST_ID=gist;
  localStorage.setItem('gh_token',tok);localStorage.setItem('gh_gist_id',gist);
  closeFB();ghGet();
}
function fbSt(s){
  document.querySelectorAll('.sync-badge').forEach(el=>{
    el.className='sync-badge '+(s==='ok'?'ok':s==='sy'?'sy':s==='er'?'er':'of');
    el.textContent=s==='ok'?'● Sync':s==='sy'?'↻ Sync':s==='er'?'✗ Erreur':'○ Local';
  });
}
function getState(){return{CR,TS,RT,SN,JN,SD,PL,SH,MI};}
function applyState(d){
  if(!d)return;
  function mById(a1,a2){const m=new Map();(a1||[]).forEach(x=>x&&x.id&&m.set(x.id,x));(a2||[]).forEach(x=>x&&x.id&&m.set(x.id,x));return Array.from(m.values());}
  function mNested(s1,s2){const r={...(s1||{})};for(const[k,es]of Object.entries(s2||{})){if(!r[k])r[k]=es;else{const seen=new Set((r[k]||[]).map(e=>e.date+e.text));r[k]=[...(r[k]||[]),...(es||[]).filter(e=>!seen.has(e.date+e.text))];}}return r;}
  CR=mById(CR,d.CR||[]);SH=mById(SH,d.SH||[]);MI=mById(MI,d.MI||[]);
  Object.assign(TS,d.TS||{});Object.assign(RT,d.RT||{});Object.assign(SD,d.SD||{});Object.assign(PL,d.PL||{});
  JN=mNested(JN,d.JN||{});SN=mNested(SN,d.SN||{});
  persist();
}
async function ghGet(){
  if(!GH_TOKEN||!GH_GIST_ID){fbSt('of');return;}
  try{
    fbSt('sy');
    const r=await fetch(`https://api.github.com/gists/${GH_GIST_ID}`,{headers:{Authorization:`token ${GH_TOKEN}`}});
    if(r.ok){const g=await r.json();const f=g.files['carnet.json'];if(f&&f.content){applyState(JSON.parse(f.content));render();}fbSt('ok');}
    else fbSt('er');
  }catch(e){fbSt('er');}
}
async function ghPut(){
  if(!GH_TOKEN||!GH_GIST_ID)return;
  try{
    fbSt('sy');
    const r=await fetch(`https://api.github.com/gists/${GH_GIST_ID}`,{method:'PATCH',headers:{Authorization:`token ${GH_TOKEN}`,'Content-Type':'application/json'},body:JSON.stringify({files:{'carnet.json':{content:JSON.stringify(getState())}}})});
    if(r.ok)fbSt('ok');else fbSt('er');
  }catch(e){fbSt('er');}
}
function scheduleSync(){persist();if(!GH_TOKEN||!GH_GIST_ID)return;if(fbTimer)clearTimeout(fbTimer);fbTimer=setTimeout(ghPut,2500);}
document.addEventListener('visibilitychange',()=>{if(!document.hidden)ghGet();});
setInterval(ghGet,45000);

// ── TIMERS ─────────────────────────────────────────────────
const TM={};let ATK=null;
function beep(){try{const c=new(window.AudioContext||window.webkitAudioContext)();[0,.3,.6].forEach(t=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;g.gain.setValueAtTime(.4,c.currentTime+t);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+t+.25);o.start(c.currentTime+t);o.stop(c.currentTime+t+.25);});}catch{}}
function startT(rid,sid,total){
  const k=tk(rid,sid);if(!TM[k])TM[k]={rem:total,total,iv:null,run:false,lab:'',rid,sid};
  const t=TM[k];const r=getR(rid);const s=(r?.steps||[]).find(x=>x.id===sid);
  t.lab=(r?.name||'')+(s?' · '+s.t:'');
  if(t.run){clearInterval(t.iv);t.run=false;setTUI(rid,sid,false);if(ATK===k){ATK=null;updFT();}}
  else{t.run=true;ATK=k;setTUI(rid,sid,true);updFT();
    t.iv=setInterval(()=>{t.rem=Math.max(0,t.rem-1);setTD(rid,sid,t.rem,t.total);if(ATK===k)updFT();if(CRid===rid&&CCS?.id===sid)updCT();
      if(t.rem===0){clearInterval(t.iv);t.run=false;tEnd(rid,sid);if(ATK===k){ATK=null;updFT();}}},1000);}
}
function resetT(rid,sid,total){const k=tk(rid,sid);if(TM[k])clearInterval(TM[k].iv);TM[k]={rem:total,total,iv:null,run:false};const d=$('td-'+rid+'-'+sid);if(d){d.textContent=fmt(total);d.className='tv';}const b=$('tb-'+rid+'-'+sid);if(b){b.textContent='▶';b.className='ib pr';}const p=$('tp-'+rid+'-'+sid);if(p)p.style.width='0';const c=$('card-'+rid+'-'+sid);if(c)c.classList.remove('run');if(ATK===k){ATK=null;updFT();}}
function setTUI(rid,sid,run){const b=$('tb-'+rid+'-'+sid),c=$('card-'+rid+'-'+sid),d=$('td-'+rid+'-'+sid);if(b){b.textContent=run?'⏸':'▶';b.className=run?'ib ru':'ib pr';}if(c)c.classList.toggle('run',run);if(d)d.className=run?'tv ru':'tv';}
function setTD(rid,sid,rem,total){const d=$('td-'+rid+'-'+sid);if(d)d.textContent=fmt(rem);const p=$('tp-'+rid+'-'+sid);if(p)p.style.width=((total-rem)/total*100).toFixed(1)+'%';}
function tEnd(rid,sid){const d=$('td-'+rid+'-'+sid);if(d){d.textContent='✓';d.className='tv dn';}const b=$('tb-'+rid+'-'+sid);if(b){b.textContent='▶';b.className='ib pr';}$('card-'+rid+'-'+sid)?.classList.remove('run');beep();navigator.vibrate?.([200,100,200]);}
function updFT(){const ft=$('ft');if(!ft)return;if(!ATK){ft.classList.remove('v');return;}const t=TM[ATK];if(!t||!t.run){ft.classList.remove('v');return;}ft.classList.add('v');const l=$('ffl');if(l)l.textContent=t.lab;const tv=$('fft');if(tv)tv.textContent=fmt(t.rem);const pb=$('ffpb');if(pb)pb.textContent=t.run?'⏸':'▶';}
function ftTog(){if(!ATK)return;const t=TM[ATK];if(t)startT(t.rid,t.sid,t.total);}
function ftStop(){if(!ATK)return;const t=TM[ATK];if(t)resetT(t.rid,t.sid,t.total);ATK=null;updFT();}

  ${r.ratio?`<div class="ratio-wrap"><div class="ratio-bar"><span class="ratio-lbl">${r.ratio[0].l}</span><div class="ratio-track">${r.ratio.map(s=>`<div style="width:${s.p}%;background:${s.c};height:100%"></div>`).join('')}</div><span class="ratio-lbl">${r.ratio[r.ratio.length-1].l}</span></div></div>`:''}
  ${r.steps?.length?`<div class="sec-head">Étapes</div><div class="steps-list">${stepsH}</div>`:''}
  ${r.notes?.length?`<div class="sec-head">Notes</div><div class="notes-block"><div class="block-hd"><div class="block-title">À retenir</div></div>${r.notes.map(n=>`<div class="note-row">${n}</div>`).join('')}</div>`:''}
  <div class="sec-head">Journal</div>
  <div class="journal-block">
    <div class="block-hd"><div class="block-title">Mes notes</div></div>
    <textarea class="jta" id="jta-${r.id}" placeholder="Résultat, ajustements…"></textarea>
    <div class="j-acts"><button class="j-save" data-rid="${r.id}" onclick="addJ(this.dataset.rid)">Enregistrer</button><button class="j-photo-btn" data-rid="${r.id}" onclick="openJP(this.dataset.rid)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg></button></div>
    <div class="j-entries" id="jlist-${r.id}"></div>
  </div>
  <div class="spc"></div></div>`;
  (r.steps||[]).forEach(s=>{if(SD[tk(r.id,s.id)]){$('card-'+r.id+'-'+s.id)?.classList.add('done');const n=$('snum-'+r.id+'-'+s.id);if(n)n.textContent='✓';}if(s.timer){const t=TM[tk(r.id,s.id)];if(t){setTD(r.id,s.id,t.rem,t.total);if(t.run)setTUI(r.id,s.id,true);}}});
  renderJ(r.id);
}
function setRat(rid,v){RT[rid]=v;scheduleSync();rRV();}
function togT(rid){TS[rid]=!TS[rid];scheduleSync();rRV();}
function chgP(rid,d){CP[rid]=Math.max(1,(CP[rid]||getR(rid)?.portions||1)+d);rRV();}

// ── PLANNER ────────────────────────────────────────────────
let PO=0;
const SLOTS=['matin','midi','soir'],SLBL={matin:'Matin',midi:'Midi',soir:'Soir'};
const DNAMES=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
function wDays(off){const now=new Date(),day=now.getDay(),mon=new Date(now);mon.setDate(now.getDate()-(day===0?6:day-1)+(off*7));return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});}
function dKey(d){return d.toISOString().slice(0,10);}
function rPlan(){
  $('tb').innerHTML='';
  const days=wDays(PO),wl=days[0].toLocaleDateString('fr-FR',{day:'numeric',month:'short'})+' – '+days[6].toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});
  $('ct').innerHTML='<div class="planner-wrap"><div class="week-nav"><button class="week-btn" onclick="PO--;rPlan()">← Avant</button><div class="week-label">'+wl+'</div><button class="week-btn" onclick="PO++;rPlan()">Après →</button></div>'
    +'<button class="gen-shop-btn" onclick="genShop()">Générer la liste de courses</button>'
    +days.map((d,i)=>{const dk=dKey(d),dp=PL[dk]||{},isT=dKey(new Date())===dk;
      return `<div class="day-block"><div class="day-hd"><div class="day-name" style="${isT?'color:var(--ac)':''}">${DNAMES[i]}</div><div class="day-date">${d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</div></div><div class="day-slots">${SLOTS.map(s=>{const rid=dp[s],r=rid?getR(rid):null;return `<div class="slot${r?' f':''}" data-dk="${dk}" data-slot="${s}" onclick="pickSlot(this.dataset.dk,this.dataset.slot)"><span class="slot-lbl">${SLBL[s]}</span><span class="slot-content">${r?r.name:'+ Ajouter'}</span>${r?`<button class="slot-clear" data-dk="${dk}" data-slot="${s}" onclick="event.stopPropagation();clrSlot(this.dataset.dk,this.dataset.slot)">×</button>`:''}</div>`;}).join('')}</div></div>`;}).join('')
    +'<div class="spc"></div></div>';
}
function pickSlot(dk,slot){showPicker(rid=>{if(!PL[dk])PL[dk]={};PL[dk][slot]=rid;scheduleSync();rPlan();});}
function clrSlot(dk,slot){if(PL[dk]){delete PL[dk][slot];scheduleSync();rPlan();}}
function genShop(){const days=wDays(PO);const rids=new Set();days.forEach(d=>{const dk=dKey(d);SLOTS.forEach(s=>{if(PL[dk]?.[s])rids.add(PL[dk][s]);});});if(!rids.size){alert('Aucune recette planifiée.');return;}rids.forEach(rid=>addToS(rid,CP[rid]||(getR(rid)?.portions||4)));sw('shopping');}

// ── SHOPPING ───────────────────────────────────────────────
function addToS(rid,portions){const r=getR(rid);if(!r)return;const ratio=portions/(r.portions||1);(r.ingredients||[]).forEach(ing=>{if(!ing.a)return;const qty=Math.round(ing.a*ratio*10)/10;const ex=SH.find(s=>s.name.toLowerCase()===ing.n.toLowerCase()&&s.unit===ing.u);if(ex)ex.qty=Math.round((ex.qty+qty)*10)/10;else SH.push({id:Date.now()+'_'+Math.random(),name:ing.n,qty,unit:ing.u||'',checked:false,source:r.name,cat:gIC(ing.n)});});scheduleSync();if(curTab==='shopping')rShop();}
function rShop(){
  $('tb').innerHTML='';
  const all=[...SH,...MI.map(m=>({...m,cat:'Divers',isM:true}))];
  const groups={};all.forEach(item=>{const cat=item.cat||'Divers';if(!groups[cat])groups[cat]=[];groups[cat].push(item);});
  const unch=all.filter(i=>!i.checked).length;
  $('ct').innerHTML='<div class="shop-wrap"><div class="shop-actions"><button class="shop-btn p" onclick="copyShop()">Copier ('+unch+')</button><button class="shop-btn" onclick="uncheckAll()">Décocher</button><button class="shop-btn" onclick="clearChecked()">Suppr. cochés</button><button class="shop-btn" style="color:var(--red)" onclick="clearAllShop()">Vider</button></div>'
    +'<div class="shop-add-row"><input class="shop-input" id="sminput" placeholder="Ajouter un article…" onkeydown="if(event.key===\'Enter\')addManual()"><button class="shop-add-btn" onclick="addManual()">+</button></div>'
    +(all.length?Object.entries(groups).map(([cat,items])=>`<div class="shop-group"><div class="shop-group-title">${cat}</div>${items.map(item=>`<div class="shop-item"><div class="shop-chk${item.checked?' done':''}" data-id="${item.id}" data-ism="${item.isM?1:0}" onclick="togShop(this.dataset.id,this.dataset.ism=='1')">${item.checked?'✓':''}</div><div class="shop-name${item.checked?' done':''}">${item.name}${item.source?`<span style="font-size:10px;color:var(--k3)"> · ${item.source}</span>`:''}</div><div class="shop-qty">${item.qty?item.qty+(item.unit?' '+item.unit:''):''}</div><button class="shop-del" data-id="${item.id}" data-ism="${item.isM?1:0}" onclick="remShop(this.dataset.id,this.dataset.ism=='1')">×</button></div>`).join('')}</div>`).join('')
    :'<div class="shop-empty">Aucun article dans la liste</div>')
    +'<div class="spc"></div></div>';
}
function copyShop(){const text=[...SH,...MI].filter(i=>!i.checked).map(i=>(i.qty?i.qty+(i.unit?' '+i.unit:'')+'  ':'')+i.name).join('\n');navigator.clipboard?.writeText(text).then(()=>alert('Liste copiée !'));}
function togShop(id,isM){const list=isM?MI:SH;const item=list.find(i=>i.id==id);if(item){item.checked=!item.checked;scheduleSync();rShop();}}
function remShop(id,isM){if(isM)MI=MI.filter(i=>i.id!=id);else SH=SH.filter(i=>i.id!=id);scheduleSync();rShop();}
function addManual(){const inp=$('sminput'),text=inp?.value.trim();if(!text)return;MI.push({id:Date.now()+'_m',name:text,checked:false});inp.value='';scheduleSync();rShop();}
function uncheckAll(){SH.forEach(i=>i.checked=false);MI.forEach(i=>i.checked=false);scheduleSync();rShop();}
function clearChecked(){SH=SH.filter(i=>!i.checked);MI=MI.filter(i=>!i.checked);scheduleSync();rShop();}
function clearAllShop(){if(confirm('Vider toute la liste ?')){SH=[];MI=[];scheduleSync();rShop();}}

// ── ADD / EDIT RECIPE ──────────────────────────────────────
function rAdd(){
  const isE=!!EID,r=isE?CR.find(x=>x.id===EID):null;
  if(isE&&r){FI=r.ingredients.map(i=>({...i}));FS=r.steps.map(s=>({...s,timer:s.timer||''}));FT=[...(r.tags||[])];FL=r.lifestyle||'';FM={k:r.macros?.kcal||'',p:r.macros?.prot||'',g:r.macros?.gluc||'',l:r.macros?.lip||''};}
  else if(!isE){FI=[{a:'',u:'g',n:''}];FS=[{t:'',timer:'',d:''}];FT=[];FL='';FM={k:'',p:'',g:'',l:''};}
  $('tb').innerHTML='';
  $('ct').innerHTML=`<div class="aw">
  ${!isE?`<div class="import-block"><div class="import-title">✨ Import via Claude</div><div class="import-desc">Envoie une photo ou un lien à Claude, copie le prompt <span onclick="copyPr()">ici</span>, colle le JSON ci-dessous.</div><textarea class="import-ta" id="jimput" placeholder='{"name":"..."}'></textarea><button class="import-btn" onclick="impJ()">Charger →</button><div id="impst" class="import-status" style="display:none"></div></div>`:''}
  <div class="fg"><label class="fl">Nom *</label><input class="fi" id="fn" value="${r?.name||''}" placeholder="Ex: Gratin dauphinois"></div>
  <div class="fr"><div class="fg"><label class="fl">Catégorie</label><select class="fsl" id="fcat">${CATS.map(c=>`<option value="${c}"${(r?.cat||'Pain')===c?' selected':''}>${CI[c]} ${c}</option>`).join('')}</select></div>
  <div class="fg"><label class="fl">Difficulté</label><select class="fsl" id="fdiff">${['Facile','Moyen','Difficile'].map(d=>`<option${(r?.difficulty||'Facile')===d?' selected':''}>${d}</option>`).join('')}</select></div></div>
  <div class="fr"><div class="fg"><label class="fl">Portions</label><input class="fi" id="fpor" type="number" min="1" value="${r?.portions||4}"></div><div class="fg"><label class="fl">Prép. (min)</label><input class="fi" id="fprep" type="number" value="${r?.prepTime||''}"></div><div class="fg"><label class="fl">Cuisson (min)</label><input class="fi" id="fck" type="number" value="${r?.cookTime||''}"></div></div>
  <div class="fg"><label class="fl">Description</label><textarea class="fta" id="fdesc">${r?.desc||''}</textarea></div>
  <div class="fg"><label class="fl">Style de vie</label><div class="lf-flex">${Object.keys(LFS).map(lf=>`<button class="lf-toggle${FL===lf?' on':''}" data-lf="${lf}" onclick="setLF(this.dataset.lf)">${LFS[lf]} ${lf}</button>`).join('')}</div></div>
  <div class="fg"><label class="fl">Macros / portion</label><div class="mac-grid"><div class="mac-wrap"><div class="mac-lbl2">kcal</div><input class="mac-input" id="fk" type="number" value="${FM.k}" oninput="FM.k=this.value" placeholder="0"></div><div class="mac-wrap"><div class="mac-lbl2">Prot. g</div><input class="mac-input" id="fp2" type="number" value="${FM.p}" oninput="FM.p=this.value" placeholder="0"></div><div class="mac-wrap"><div class="mac-lbl2">Gluc. g</div><input class="mac-input" id="fg2" type="number" value="${FM.g}" oninput="FM.g=this.value" placeholder="0"></div><div class="mac-wrap"><div class="mac-lbl2">Lip. g</div><input class="mac-input" id="fl2" type="number" value="${FM.l}" oninput="FM.l=this.value" placeholder="0"></div></div></div>
  <div class="fg"><label class="fl">Tags</label><div class="tags-flex">${TAGS.map(t=>`<button class="tag-toggle${FT.includes(t)?' on':''}" data-tag="${t}" onclick="togFT(this.dataset.tag)">${t}</button>`).join('')}</div></div>
  <div class="fg"><label class="fl">Ingrédients</label><div id="inglist">${FI.map((ing,i)=>mkIRow(ing,i)).join('')}</div><button class="add-row-btn" onclick="addIng()">+ Ingrédient</button></div>
  <div class="fg"><label class="fl">Étapes</label><div id="stlist">${FS.map((s,i)=>mkSRow(s,i)).join('')}</div><button class="add-row-btn" onclick="addSt()">+ Étape</button></div>
  <div class="fg"><label class="fl">Notes (une par ligne)</label><textarea class="fta" id="fnotes">${(r?.notes||[]).join('\n')}</textarea></div>
  <button class="submit-btn" onclick="saveR()">${isE?'Enregistrer':'Créer la recette'}</button>
  ${isE?`<button class="delete-btn" data-rid="${r.id}" onclick="delR(this.dataset.rid)">Supprimer</button>`:''}
  <div class="spc"></div></div>`;
}
function mkIRow(ing,i){return `<div class="dyn-row"><input class="fi" style="width:60px;flex:none" placeholder="Qté" value="${ing.a||''}" data-idx="${i}" oninput="FI[parseInt(this.dataset.idx)].a=this.value"><select class="fsl" style="width:68px;flex:none" data-idx="${i}" onchange="FI[parseInt(this.dataset.idx)].u=this.value">${UNITS.map(u=>`<option${ing.u===u?' selected':''}>${u}</option>`).join('')}</select><input class="fi" placeholder="Ingrédient" value="${ing.n||''}" data-idx="${i}" oninput="FI[parseInt(this.dataset.idx)].n=this.value"><button class="dyn-del" data-idx="${i}" onclick="remIng(parseInt(this.dataset.idx))">×</button></div>`;}
function mkSRow(s,i){return `<div style="border:1px solid var(--bdr);border-radius:12px;padding:12px;margin-bottom:8px"><div class="fr"><div class="fg" style="flex:2"><input class="fi" placeholder="Titre" value="${s.t||''}" data-idx="${i}" oninput="FS[parseInt(this.dataset.idx)].t=this.value"></div><div class="fg" style="flex:1"><input class="fi" placeholder="Durée (sec)" type="number" value="${s.timer||''}" data-idx="${i}" oninput="FS[parseInt(this.dataset.idx)].timer=this.value?parseInt(this.value):null"></div><button class="dyn-del" data-idx="${i}" onclick="remSt(parseInt(this.dataset.idx))" style="align-self:center">×</button></div><textarea class="fta" style="min-height:52px;margin-top:8px" placeholder="Description…" data-idx="${i}" oninput="FS[parseInt(this.dataset.idx)].d=this.value">${s.d||''}</textarea></div>`;}
function setLF(lf){FL=FL===lf?'':lf;rAdd();}
function togFT(t){if(FT.includes(t))FT=FT.filter(x=>x!==t);else FT.push(t);rAdd();}
function addIng(){FI.push({a:'',u:'g',n:''});$('inglist').innerHTML=FI.map((ing,i)=>mkIRow(ing,i)).join('');}
function remIng(i){FI.splice(i,1);$('inglist').innerHTML=FI.map((ing,i)=>mkIRow(ing,i)).join('');}
function addSt(){FS.push({t:'',timer:'',d:''});$('stlist').innerHTML=FS.map((s,i)=>mkSRow(s,i)).join('');}
function remSt(i){FS.splice(i,1);$('stlist').innerHTML=FS.map((s,i)=>mkSRow(s,i)).join('');}
function saveR(){
  const name=$('fn')?.value.trim();if(!name){alert('Nom obligatoire.');return;}
  const cat=$('fcat')?.value,diff=$('fdiff')?.value;
  const prep=parseInt($('fprep')?.value)||0,ck=parseInt($('fck')?.value)||0;
  const nr={id:EID||(Date.now()+''),isCustom:true,cat,name,fullName:name,tag:cat+' · '+diff,desc:$('fdesc')?.value||'',portions:parseInt($('fpor')?.value)||4,prepTime:prep,cookTime:ck,difficulty:diff,tags:[...FT],lifestyle:FL||null,macros:{kcal:parseInt(FM.k)||0,prot:parseInt(FM.p)||0,gluc:parseInt(FM.g)||0,lip:parseInt(FM.l)||0},meta:[{v:(prep+ck)?prep+ck+'min':'–',l:'Durée'},{v:cat,l:'Type'},{v:diff,l:'Niveau'}],ingredients:FI.filter(i=>i.n).map(i=>({a:i.a?parseFloat(i.a):null,u:i.u||'g',n:i.n})),steps:FS.filter(s=>s.t).map((s,j)=>({id:'s'+(j+1),t:s.t,timer:s.timer||null,d:s.d||''})),notes:($('fnotes')?.value||'').split('\n').filter(Boolean),ratio:null};
  if(EID){const idx=CR.findIndex(r=>r.id===EID);if(idx>=0)CR[idx]=nr;}else CR.push(nr);
  scheduleSync();EID=null;FI=[{a:'',u:'g',n:''}];FS=[{t:'',timer:'',d:''}];FT=[];FL='';FM={k:'',p:'',g:'',l:''};sw('home');
}
function editR(rid){EID=rid;curRid=null;$('tb').style.display='';sw('add');}
function delR(rid){if(!confirm('Supprimer ?'))return;CR=CR.filter(r=>r.id!==rid);scheduleSync();EID=null;sw('home');}

// Import via Claude
function copyPr(){const p='Génère uniquement le JSON brut (sans markdown) : {"name":"","cat":"Pain","desc":"","portions":4,"prepTime":0,"cookTime":0,"difficulty":"Facile","lifestyle":"Healthy","macros":{"kcal":0,"prot":0,"gluc":0,"lip":0},"tags":[],"ingredients":[{"amount":0,"unit":"g","name":""}],"steps":[{"title":"","timer":null,"desc":""}],"notes":[]}';navigator.clipboard?.writeText(p).then(()=>setIS('✅ Prompt copié !'));}
function setIS(msg,err){const el=$('impst');if(!el)return;el.style.display=msg?'block':'none';el.textContent=msg;el.className='imps'+(err?' err':'');}
function impJ(){const raw=$('jimput')?.value.trim();if(!raw){alert('Colle un JSON');return;}try{fillF(JSON.parse(raw));setIS('✅ Recette chargée — vérifie et enregistre !');}catch(e){setIS('❌ JSON invalide',true);}}
function fillF(rcp){
  if(!rcp)return;
  if(rcp.name&&$('fn'))$('fn').value=rcp.name;
  if(rcp.cat&&$('fcat')){const o=[...$('fcat').options].find(op=>op.value===rcp.cat);if(o)$('fcat').value=rcp.cat;}
  if(rcp.difficulty&&$('fdiff'))$('fdiff').value=rcp.difficulty;
  if(rcp.portions&&$('fpor'))$('fpor').value=rcp.portions;
  if(rcp.prepTime&&$('fprep'))$('fprep').value=rcp.prepTime;
  if(rcp.cookTime&&$('fck'))$('fck').value=rcp.cookTime;
  if(rcp.desc&&$('fdesc'))$('fdesc').value=rcp.desc;
  if(rcp.lifestyle)FL=rcp.lifestyle;
  if(rcp.macros)FM={k:rcp.macros.kcal||'',p:rcp.macros.prot||'',g:rcp.macros.gluc||'',l:rcp.macros.lip||''};
  if(rcp.tags)FT=(rcp.tags||[]).filter(t=>TAGS.includes(t));
  const ings=rcp.ingredients||[];if(ings.length)FI=ings.map(i=>({a:i.amount||i.a||'',u:i.unit||i.u||'g',n:i.name||i.n||''}));
  const steps=rcp.steps||[];if(steps.length)FS=steps.map(s=>({t:s.title||s.t||'',timer:s.timer||'',d:s.desc||s.d||''}));
  if(rcp.notes&&$('fnotes'))$('fnotes').value=(rcp.notes||[]).join('\n');
  $('inglist').innerHTML=FI.map((ing,i)=>mkIRow(ing,i)).join('');
  $('stlist').innerHTML=FS.map((s,i)=>mkSRow(s,i)).join('');
  rAdd();
}

// ── MODALS ─────────────────────────────────────────────────
function showPicker(cb){
  const mo=$('mo'),sh=$('msh');let q='';
  const rl=()=>{const f=allR().filter(r=>!q||r.name.toLowerCase().includes(q.toLowerCase()));
    sh.innerHTML=`<div class="modal-hd"><div class="modal-title">Choisir une recette</div><button class="modal-close-btn" onclick="closeM()">× Fermer</button></div><div class="modal-search"><div class="sr"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input style="border:none;outline:none;font-size:14px;font-family:Inter,sans-serif;color:var(--ink);background:transparent;width:100%" placeholder="Rechercher…" oninput="mQ(this.value)"></div></div><div class="modal-list">${f.map(r=>`<div class="modal-item" data-rid="${r.id}" onclick="pickR(this.dataset.rid)"><div class="modal-strip" style="background:${CC[r.cat]||'#888'}"></div><div><div class="modal-rname">${r.name}</div><div class="modal-rcat">${CI[r.cat]} ${r.cat}</div></div></div>`).join('')}</div>`;};
  window._pcb=cb;window.mQ=(v)=>{q=v;rl();};window.pickR=(rid)=>{closeM();window._pcb(rid);};rl();mo.classList.add('open');
}
function closeM(){$('mo').classList.remove('open');}
$('mo').addEventListener('click',e=>{if(e.target===$('mo'))closeM();});

// ── EXPORT / IMPORT MANUEL ─────────────────────────────────
function openExp(){$('expta').style.display='none';$('expta').value='';$('expm').classList.add('open');}
function closeExp(){$('expm').classList.remove('open');}
function doExport(){
  const json=JSON.stringify(getState());
  if(navigator.share){navigator.share({title:'Mon Carnet',text:json}).catch(()=>fallbackCopy(json));}
  else fallbackCopy(json);
}
function fallbackCopy(text){navigator.clipboard?.writeText(text).then(()=>alert('Données copiées !')).catch(()=>{$('expta').style.display='block';$('expta').value=text;});}
function showImport(){
  $('expta').style.display='block';
  const txt=$('expta').value.trim();if(!txt)return;
  try{applyState(JSON.parse(txt));closeExp();render();alert('Import réussi !');}catch{alert('Format invalide.');}
}
$('expm').addEventListener('click',e=>{if(e.target===$('expm'))closeExp();});

// ── INIT ───────────────────────────────────────────────────
ghGet();
render();

</script>
</body>
