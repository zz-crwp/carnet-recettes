<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Mon Carnet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  /* Palette ivoire moderne */
  --bg: #F7F5F0;
  --card: #FFFFFF;
  --sur: #EFF2EE;
  --bdr: rgba(15, 23, 42, 0.07);
  --ink: #0F172A;
  --k2: #475569;
  --k3: #94A3B8;
  /* Vert émeraude culinaire */
  --ac: #059669;
  --al: #E6F4EA;
  --ad: #064E3B;
  /* Accents */
  --gold: #F59E0B;
  --red: #F43F5E;
  /* Ombres iOS */
  --sh: 0 4px 16px -2px rgba(15,23,42,.06), 0 1px 3px rgba(15,23,42,.04);
  --sh2: 0 12px 32px -4px rgba(15,23,42,.12), 0 2px 6px rgba(15,23,42,.05);
  --r: 20px;
  --st: env(safe-area-inset-top, 0px);
  --sb: env(safe-area-inset-bottom, 0px);
  --nav: 66px;
}
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; overflow-x: hidden; letter-spacing: -0.01em; }
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

/* TOPBAR — glassmorphism */
#tb { flex-shrink: 0; background: rgba(247,245,240,.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--bdr); padding: calc(var(--st)+13px) 20px 13px; display: flex; align-items: center; gap: 12px; z-index: 20; position: sticky; top: 0; }
.ttl { font-family: 'Lora', serif; font-size: 20px; font-weight: 400; flex: 1; }
.ttl em { font-style: italic; color: var(--ac); }
.ic-btn { width: 36px; height: 36px; border-radius: 10px; border: none; background: var(--sur); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; flex-shrink: 0; transition: background .15s; }
.ic-btn:active { background: var(--bdr); }
.sync-badge { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 100px; flex-shrink: 0; letter-spacing: .05em; text-transform: uppercase; }
.sync-badge.of { background: var(--sur); color: var(--k2); }
.sync-badge.sy { background: #FEF3C7; color: #D97706; }
.sync-badge.er { background: #FEE2E2; color: var(--red); }
.sync-badge.ok { background: var(--al); color: var(--ad); }

/* CONTENT + NAV — glassmorphism */
#ct { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
#bn { flex-shrink: 0; background: rgba(255,255,255,.88); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--bdr); display: flex; height: calc(var(--nav) + var(--sb)); padding-bottom: var(--sb); z-index: 20; }
.tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; border: none; background: none; font-family: 'Inter', sans-serif; color: var(--k3); font-size: 11px; font-weight: 600; position: relative; -webkit-tap-highlight-color: transparent; transition: color .2s; }
.tab:active { transform: scale(.95); }
.tab.on { color: var(--ac); }
.tab-ic { font-size: 22px; line-height: 1; }
.tab::after { content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%) scaleX(0); width: 22px; height: 3px; background: var(--ac); border-radius: 2px; transition: transform .25s cubic-bezier(.4,0,.2,1); }
.tab.on::after { transform: translateX(-50%) scaleX(1); }

/* SEARCH */
.sw { padding: 14px 20px 10px; }
.sr { display: flex; align-items: center; gap: 10px; background: var(--card); border: 1.5px solid var(--bdr); border-radius: 14px; padding: 11px 15px; box-shadow: var(--sh); }
.sr svg { flex-shrink: 0; opacity: .35; }
.sr input { border: none; outline: none; font-size: 15px; font-family: 'Inter', sans-serif; color: var(--ink); background: transparent; width: 100%; }
.sr input::placeholder { color: var(--k3); }

/* CATEGORY CIRCLES */
.cscroll { padding: 6px 20px 14px; display: flex; gap: 14px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; border-bottom: 1px solid var(--bdr); }
.cscroll::-webkit-scrollbar { display: none; }
.citem { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.ccircle { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; background: var(--sur); border: 2.5px solid transparent; transition: all .2s; }
.citem.on .ccircle { box-shadow: 0 0 0 3px rgba(5,150,105,.2); }
.clabel { font-size: 10px; font-weight: 700; color: var(--k3); white-space: nowrap; letter-spacing: .03em; transition: color .2s; }
.citem.on .clabel { color: var(--ac); }

/* TAG CHIPS */
.trow { padding: 8px 20px 12px; display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; border-bottom: 1px solid var(--bdr); }
.trow::-webkit-scrollbar { display: none; }
.chip { flex-shrink: 0; padding: 6px 15px; border-radius: 100px; border: 1.5px solid var(--bdr); background: var(--card); font-size: 12px; font-weight: 600; font-family: 'Inter', sans-serif; color: var(--k2); cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; transition: all .15s; box-shadow: var(--sh); }
.chip.on { background: var(--ink); border-color: var(--ink); color: #fff; }

/* RECIPE CARDS */
.rgrid { padding: 14px 20px 90px; display: flex; flex-direction: column; gap: 14px; max-width: 680px; margin: 0 auto; }
.rcard { background: var(--card); border-radius: var(--r); overflow: hidden; box-shadow: var(--sh); cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform .15s, box-shadow .15s; }
.rcard:active { transform: scale(.97); box-shadow: var(--sh2); }
.rhead { padding: 20px 18px 16px; position: relative; min-height: 92px; display: flex; flex-direction: column; justify-content: flex-end; }
.rhead-em { position: absolute; top: 16px; right: 16px; font-size: 32px; opacity: .65; }
.rhead-cat { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .14em; color: rgba(255,255,255,.6); margin-bottom: 5px; }
.rhead-name { font-family: 'Lora', serif; font-size: 18px; color: #fff; line-height: 1.25; font-weight: 400; }
.rhead-name em { font-style: italic; }
.rbody { padding: 12px 18px 14px; }
.rmeta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 9px; }
.rmp { font-size: 11px; font-weight: 600; color: var(--k2); }
.rms { color: var(--bdr); font-size: 13px; }
.rfoot { display: flex; align-items: center; justify-content: space-between; }
.rbadges { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
.bstar { font-size: 13px; color: var(--gold); }
.btested { font-size: 11px; background: var(--al); color: var(--ad); padding: 3px 10px; border-radius: 100px; font-weight: 700; }
.blf { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 100px; }
.rarrow { font-size: 20px; color: var(--k3); }
.empty { text-align: center; padding: 64px 24px; }
.empty-ic { font-size: 48px; margin-bottom: 16px; }
.empty-tx { font-family: 'Lora', serif; font-size: 21px; color: var(--k2); font-style: italic; }

/* HERO */
.hero { padding: calc(var(--st)+14px) 20px 24px; min-height: 220px; display: flex; flex-direction: column; justify-content: flex-end; }
.hero-acts { display: flex; gap: 8px; margin-bottom: auto; padding-bottom: 20px; flex-wrap: wrap; }
.hbtn { padding: 8px 14px; border-radius: 100px; border: none; background: rgba(255,255,255,.22); backdrop-filter: blur(8px); color: #fff; font-size: 13px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.hcat { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .14em; color: rgba(255,255,255,.6); margin-bottom: 7px; }
.htitle { font-family: 'Lora', serif; font-size: 30px; color: #fff; line-height: 1.15; margin-bottom: 9px; }
.htitle em { font-style: italic; }
.hdesc { font-size: 13px; color: rgba(255,255,255,.76); line-height: 1.7; font-weight: 300; margin-bottom: 12px; }
.hrow { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.srow { display: flex; gap: 4px; }
.star { font-size: 24px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.htt { padding: 7px 16px; border-radius: 100px; border: none; background: rgba(255,255,255,.18); font-size: 13px; font-weight: 700; font-family: 'Inter', sans-serif; color: #fff; cursor: pointer; }
.htt.on { background: #fff; color: var(--ad); }
.hlf { font-size: 12px; font-weight: 700; padding: 5px 13px; border-radius: 100px; background: rgba(255,255,255,.2); color: #fff; }

/* META + MACROS + TAGS */
.sh { padding: 18px 20px 8px; font-size: 10px; text-transform: uppercase; letter-spacing: .16em; color: var(--k3); font-weight: 800; }
.tdetail { padding: 10px 20px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid var(--bdr); }
.tpill { font-size: 12px; background: var(--al); color: var(--ad); padding: 5px 12px; border-radius: 100px; font-weight: 600; }
.mstrip { display: flex; border-bottom: 1px solid var(--bdr); background: var(--sur); }
.mcell { flex: 1; padding: 14px 0; text-align: center; border-right: 1px solid var(--bdr); }
.mcell:last-child { border-right: none; }
.mval { display: block; font-family: 'Lora', serif; font-size: 19px; }
.mlbl { display: block; font-size: 9px; color: var(--k3); text-transform: uppercase; letter-spacing: .13em; margin-top: 3px; font-weight: 700; }
.macrow { display: flex; margin: 0 20px; background: var(--sur); border-radius: 14px; overflow: hidden; border: 1px solid var(--bdr); }
.maccell { flex: 1; padding: 13px 0; text-align: center; border-right: 1px solid var(--bdr); }
.maccell:last-child { border-right: none; }
.macval { display: block; font-family: 'Lora', serif; font-size: 18px; }
.maclbl { display: block; font-size: 9px; color: var(--k3); text-transform: uppercase; letter-spacing: .1em; margin-top: 3px; font-weight: 700; }

/* RELATED */
.relrow { padding: 0 20px 6px; display: flex; gap: 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.relrow::-webkit-scrollbar { display: none; }
.relcard { flex-shrink: 0; width: 128px; background: var(--card); border-radius: 14px; box-shadow: var(--sh); overflow: hidden; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.relcard:active { opacity: .8; }
.relband { height: 48px; display: flex; align-items: center; justify-content: center; font-size: 26px; }
.relbody { padding: 8px 10px 10px; }
.relcat { font-size: 9px; text-transform: uppercase; letter-spacing: .1em; color: var(--k3); font-weight: 700; }
.relname { font-size: 12px; font-weight: 600; line-height: 1.35; margin-top: 3px; color: var(--ink); }

/* PORTIONS */
.porbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 22px; border-bottom: 1px solid var(--bdr); }
.porlbl { font-size: 14px; font-weight: 500; color: var(--k2); }
.porstepper { display: flex; align-items: center; gap: 16px; }
.porbtn { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--ac); background: var(--card); font-size: 22px; cursor: pointer; color: var(--ac); font-weight: 700; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; transition: transform .1s; }
.porbtn:active { transform: scale(.88); }
.porval { font-family: 'Lora', serif; font-size: 26px; min-width: 34px; text-align: center; }

/* INGREDIENTS */
.inglist { padding: 0 20px 10px; }
.ingrow { display: flex; align-items: baseline; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--bdr); }
.ingrow:last-child { border-bottom: none; }
.ingqty { font-family: 'Lora', serif; font-size: 16px; min-width: 62px; text-align: right; flex-shrink: 0; }
.ingunit { font-size: 11px; color: var(--k3); margin-left: 2px; }
.ingname { font-size: 14px; flex: 1; }
.ingbadge { font-size: 10px; color: var(--gold); background: #FFF8ED; padding: 3px 9px; border-radius: 8px; font-weight: 700; }
.atsbtn { margin: 6px 20px 4px; width: calc(100% - 40px); padding: 12px; border: 1.5px dashed var(--bdr); border-radius: 12px; background: none; font-size: 13px; color: var(--k3); cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 600; transition: all .15s; }
.atsbtn:active { color: var(--ac); border-color: var(--ac); }
.ratiowrap { padding: 6px 20px 8px; }
.ratiobar { background: var(--sur); border-radius: 10px; padding: 11px 14px; display: flex; align-items: center; gap: 12px; border: 1px solid var(--bdr); }
.ratiolbl { font-size: 11px; color: var(--k2); white-space: nowrap; font-weight: 600; }
.ratiotrack { flex: 1; height: 6px; background: var(--bdr); border-radius: 3px; overflow: hidden; display: flex; }

/* STEPS */
.stepslist { padding: 0 20px; display: flex; flex-direction: column; gap: 12px; }
.sc { border-radius: 16px; overflow: hidden; background: var(--card); box-shadow: var(--sh); transition: box-shadow .2s; }
.sc.run { box-shadow: 0 0 0 2.5px var(--ac), var(--sh); }
.sc.done { background: var(--al); box-shadow: none; }
.spg { height: 3px; background: var(--bdr); }
.spgf { height: 100%; background: var(--ac); width: 0; transition: width 1s linear; }
.sc.done .spgf { width: 100%!important; }
.si2 { padding: 16px 16px 10px; }
.stop { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
.snum { width: 26px; height: 26px; border-radius: 50%; background: var(--sur); font-size: 11px; font-weight: 800; color: var(--k2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
.sc.done .snum { background: var(--ac); color: #fff; }
.stitle { flex: 1; font-size: 14px; font-weight: 700; line-height: 1.35; padding-top: 3px; }
.sacts { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.sdesc { font-size: 13px; color: var(--k2); line-height: 1.75; font-weight: 300; padding-left: 38px; }
.sbot { padding: 6px 16px 12px 54px; }
.ntog { font-size: 11px; color: var(--k3); cursor: pointer; background: none; border: none; font-family: 'Inter', sans-serif; font-weight: 600; padding: 0; }
.ntog.has { color: var(--gold); }
.nzone { display: none; border-top: 1px solid var(--bdr); padding: 12px 16px 12px 54px; background: var(--sur); }
.nzone.open { display: block; }
.nentry { display: flex; gap: 9px; align-items: flex-start; margin-bottom: 8px; }
.ndate { font-size: 10px; color: var(--k3); white-space: nowrap; flex-shrink: 0; padding-top: 2px; font-weight: 600; }
.ntext { font-size: 12px; color: var(--k2); flex: 1; line-height: 1.55; }
.ndel { background: none; border: none; color: var(--k3); cursor: pointer; font-size: 14px; padding: 0 2px; }
.nadd { display: flex; gap: 8px; margin-top: 6px; }
.ninput { flex: 1; border: 1.5px solid var(--bdr); border-radius: 10px; padding: 9px 12px; font-size: 13px; font-family: 'Inter', sans-serif; background: #fff; color: var(--ink); outline: none; box-shadow: var(--sh); }
.ninput::placeholder { color: var(--k3); }
.nsave { padding: 9px 15px; background: var(--ink); color: #fff; border: none; border-radius: 10px; font-size: 12px; font-family: 'Inter', sans-serif; cursor: pointer; font-weight: 700; }
.ib { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--bdr); background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; color: var(--k2); flex-shrink: 0; -webkit-tap-highlight-color: transparent; box-shadow: var(--sh); }
.ib:active { transform: scale(.88); }
.ib.pr { background: var(--ink); border-color: var(--ink); color: #fff; }
.ib.ru { background: var(--ac); border-color: var(--ac); color: #fff; }
.ib.dn { background: var(--ac); border-color: var(--ac); color: #fff; }
.tw { display: flex; align-items: center; gap: 5px; }
.tv { font-size: 12px; font-weight: 700; color: var(--k3); min-width: 38px; text-align: right; font-variant-numeric: tabular-nums; }
.tv.ru { color: var(--ac); } .tv.dn { color: var(--ac); }

/* NOTES / JOURNAL */
.nblock, .jblock { margin: 0 20px; background: var(--sur); border-radius: 16px; padding: 18px; border: 1px solid var(--bdr); }
.btitle { font-size: 10px; text-transform: uppercase; letter-spacing: .14em; color: var(--k3); margin-bottom: 12px; font-weight: 800; }
.nrow { font-size: 13px; color: var(--k2); line-height: 1.7; padding-left: 18px; position: relative; margin-bottom: 7px; font-weight: 300; }
.nrow::before { content: '→'; position: absolute; left: 0; color: var(--ac); font-weight: 700; }
.jta { width: 100%; min-height: 72px; border: 1.5px solid var(--bdr); border-radius: 12px; padding: 11px 14px; font-size: 13px; font-family: 'Inter', sans-serif; color: var(--ink); background: #fff; resize: none; outline: none; -webkit-appearance: none; box-shadow: var(--sh); transition: border-color .2s; }
.jta:focus { border-color: var(--ac); }
.jta::placeholder { color: var(--k3); }
.jacts { display: flex; gap: 9px; margin-top: 10px; }
.jsave { flex: 1; padding: 11px; background: var(--ink); color: #fff; border: none; border-radius: 12px; font-size: 13px; font-family: 'Inter', sans-serif; cursor: pointer; font-weight: 700; }
.jphoto { padding: 11px 16px; background: none; border: 1.5px solid var(--bdr); border-radius: 12px; font-size: 15px; cursor: pointer; box-shadow: var(--sh); }
.jentries { margin-top: 12px; }
.jentry { display: flex; gap: 9px; align-items: flex-start; padding: 11px 0; border-top: 1px solid var(--bdr); }
.jdate { font-size: 10px; color: var(--k3); white-space: nowrap; flex-shrink: 0; padding-top: 2px; font-weight: 700; }
.jbody { flex: 1; }
.jtext { font-size: 13px; color: var(--k2); line-height: 1.55; }
.jph { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; margin-top: 8px; display: block; border: 1px solid var(--bdr); }
.jdl { background: none; border: none; color: var(--k3); cursor: pointer; font-size: 18px; flex-shrink: 0; padding: 0 4px; }

/* PLANNER */
.pw { max-width: 680px; margin: 0 auto; padding-bottom: 40px; }
.wn { display: flex; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--bdr); gap: 12px; background: #fff; }
.wl { flex: 1; text-align: center; font-size: 14px; font-weight: 700; color: var(--ink); }
.wb { padding: 8px 16px; border: 1px solid var(--bdr); border-radius: 10px; background: var(--card); font-size: 13px; color: var(--k2); cursor: pointer; font-weight: 600; box-shadow: var(--sh); }
.gsb { margin: 16px 20px 0; width: calc(100% - 40px); padding: 14px; background: var(--ac); color: #fff; border: none; border-radius: 14px; font-size: 14px; cursor: pointer; font-weight: 700; box-shadow: 0 4px 14px rgba(5,150,105,.3); }
.db { border-bottom: 1px solid var(--bdr); background: #fff; margin-bottom: 2px; }
.dh { padding: 14px 20px 8px; display: flex; align-items: center; gap: 8px; }
.dn2 { font-size: 14px; font-weight: 700; color: var(--ink); }
.dd { font-size: 12px; color: var(--k3); font-weight: 500; }
.ds { padding: 0 20px 14px; display: flex; flex-direction: column; gap: 8px; }
.slot { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 14px; background: var(--sur); cursor: pointer; transition: all .2s; -webkit-tap-highlight-color: transparent; }
.slot.f { background: var(--card); box-shadow: var(--sh); border: 1px solid var(--bdr); }
.sll { font-size: 11px; color: var(--k3); min-width: 44px; text-transform: uppercase; letter-spacing: .05em; font-weight: 700; }
.slc { flex: 1; font-size: 14px; color: var(--k3); }
.slot.f .slc { color: var(--ink); font-weight: 600; }
.slx { background: none; border: none; color: var(--k3); font-size: 18px; cursor: pointer; }

/* SHOPPING */
.shw { max-width: 680px; margin: 0 auto; padding-bottom: 40px; }
.sa2 { display: flex; gap: 8px; padding: 14px 20px; border-bottom: 1px solid var(--bdr); flex-wrap: wrap; background: #fff; }
.sb2 { padding: 8px 16px; border-radius: 10px; border: 1px solid var(--bdr); background: var(--card); font-size: 13px; color: var(--k2); cursor: pointer; font-weight: 600; box-shadow: var(--sh); }
.sb2.p { background: var(--ac); border-color: var(--ac); color: #fff; box-shadow: 0 4px 12px rgba(5,150,105,.25); }
.sam { display: flex; gap: 10px; padding: 14px 20px; border-bottom: 1px solid var(--bdr); background: #fff; }
.smi { flex: 1; border: 1px solid var(--bdr); border-radius: 12px; padding: 12px 16px; font-size: 14px; font-family: 'Inter', sans-serif; color: var(--ink); background: var(--bg); outline: none; box-shadow: var(--sh); }
.sma { padding: 12px 20px; background: var(--ink); color: #fff; border: none; border-radius: 12px; font-size: 14px; cursor: pointer; font-weight: 700; }
.sgt { padding: 16px 20px 6px; font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--k3); font-weight: 700; }
.sit { display: flex; align-items: center; gap: 14px; padding: 14px 20px; border-top: 1px solid var(--bdr); background: #fff; }
.sch { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--k3); display: flex; align-items: center; justify-content: center; font-size: 12px; color: transparent; cursor: pointer; flex-shrink: 0; transition: all .2s; -webkit-tap-highlight-color: transparent; }

// ── GITHUB GIST SYNC ──────────────────────────────────────
// Token & Gist ID stored in localStorage — never in source code
let GH_TOKEN=localStorage.getItem('gh_token')||'';
let GH_GIST_ID=localStorage.getItem('gh_gist_id')||'';
let fbTimer=null;

function openFB(){
  const m=document.getElementById('fbm');
  if(!m)return;
  m.innerHTML=`<div class="fbsh">
    <div class="fbtt">🔗 GitHub Sync</div>
    <p class="fbd">Stocke tes données sur un Gist GitHub privé. Setup unique par appareil.</p>
    <div class="fg"><label class="fl">Personal Access Token</label>
      <input type="password" id="ghTok" class="fi" value="${GH_TOKEN}" placeholder="ghp_…"></div>
    <div class="fg"><label class="fl">Gist ID</label>
      <input type="text" id="ghGist" class="fi" value="${GH_GIST_ID}" placeholder="7a8b9c0d…"></div>
    <button class="sub" onclick="saveGHCfg()">Activer la synchro</button>
    <button class="del" style="border-color:var(--k3);color:var(--k2)" onclick="closeFB()">Annuler</button>
  </div>`;
  m.classList.add('open');
}
function closeFB(){document.getElementById('fbm')?.classList.remove('open');}
function saveGHCfg(){
  const tok=document.getElementById('ghTok').value.trim();
  const gist=document.getElementById('ghGist').value.trim();
  if(!tok||!gist){alert('Remplis les deux champs.');return;}
  GH_TOKEN=tok;GH_GIST_ID=gist;
  localStorage.setItem('gh_token',tok);localStorage.setItem('gh_gist_id',gist);
  closeFB();ghGet();
}
function fbSt(s){
  document.querySelectorAll('.sync-badge').forEach(el=>{
    el.className='sync-badge '+(s==='ok'?'ok':s==='sy'?'sy':s==='er'?'er':'of');
    el.textContent=s==='ok'?'● Sync':s==='sy'?'↻ Sync':s==='er'?'✗ Erreur':'○ Local';
  });
}
function getState(){return{CR,TS,RT,SN,JN,SD,PL,SH,MI};}
function applyState(d){
  if(!d)return;
  function mById(a1,a2){const m=new Map();(a1||[]).forEach(x=>x&&x.id&&m.set(x.id,x));(a2||[]).forEach(x=>x&&x.id&&m.set(x.id,x));return Array.from(m.values());}
  function mNested(s1,s2){const r={...(s1||{})};for(const[k,es]of Object.entries(s2||{})){if(!r[k])r[k]=es;else{const seen=new Set((r[k]||[]).map(e=>e.date+e.text));r[k]=[...(r[k]||[]),...(es||[]).filter(e=>!seen.has(e.date+e.text))];}}return r;}
  CR=mById(CR,d.CR||[]);SH=mById(SH,d.SH||[]);MI=mById(MI,d.MI||[]);
  Object.assign(TS,d.TS||{});Object.assign(RT,d.RT||{});Object.assign(SD,d.SD||{});Object.assign(PL,d.PL||{});
  JN=mNested(JN,d.JN||{});SN=mNested(SN,d.SN||{});
  persist();
}
async function ghGet(){
  if(!GH_TOKEN||!GH_GIST_ID){fbSt('of');return;}
  try{
    fbSt('sy');
    const r=await fetch(`https://api.github.com/gists/${GH_GIST_ID}`,{headers:{Authorization:`token ${GH_TOKEN}`}});
    if(r.ok){const g=await r.json();const f=g.files['carnet.json'];if(f&&f.content){applyState(JSON.parse(f.content));render();}fbSt('ok');}
    else fbSt('er');
  }catch(e){fbSt('er');}
}
async function ghPut(){
  if(!GH_TOKEN||!GH_GIST_ID)return;
  try{
    fbSt('sy');
    const r=await fetch(`https://api.github.com/gists/${GH_GIST_ID}`,{method:'PATCH',headers:{Authorization:`token ${GH_TOKEN}`,'Content-Type':'application/json'},body:JSON.stringify({files:{'carnet.json':{content:JSON.stringify(getState())}}})});
    if(r.ok)fbSt('ok');else fbSt('er');
  }catch(e){fbSt('er');}
}
function scheduleSync(){persist();if(!GH_TOKEN||!GH_GIST_ID)return;if(fbTimer)clearTimeout(fbTimer);fbTimer=setTimeout(ghPut,2500);}
document.addEventListener('visibilitychange',()=>{if(!document.hidden)ghGet();});
setInterval(ghGet,45000);

function startT(rid,sid,total){
  const k=tk(rid,sid);if(!TM[k])TM[k]={rem:total,total,iv:null,run:false,lab:'',rid,sid};
  const t=TM[k];const r=getR(rid);const s=(r?.steps||[]).find(x=>x.id===sid);
  t.lab=(r?.name||'')+(s?' · '+s.t:'');
  if(t.run){clearInterval(t.iv);t.run=false;setTUI(rid,sid,false);if(ATK===k){ATK=null;updFT();}}
  else{t.run=true;ATK=k;setTUI(rid,sid,true);updFT();
    t.iv=setInterval(()=>{t.rem=Math.max(0,t.rem-1);setTD(rid,sid,t.rem,t.total);if(ATK===k)updFT();if(CRid===rid&&CCS?.id===sid)updCT();
      if(t.rem===0){clearInterval(t.iv);t.run=false;tEnd(rid,sid);if(ATK===k){ATK=null;updFT();}}},1000);}
}
function resetT(rid,sid,total){const k=tk(rid,sid);if(TM[k])clearInterval(TM[k].iv);TM[k]={rem:total,total,iv:null,run:false};const d=$('td-'+rid+'-'+sid);if(d){d.textContent=fmt(total);d.className='tv';}const b=$('tb-'+rid+'-'+sid);if(b){b.textContent='▶';b.className='ib pr';}const p=$('tp-'+rid+'-'+sid);if(p)p.style.width='0';const c=$('card-'+rid+'-'+sid);if(c)c.classList.remove('run');if(ATK===k){ATK=null;updFT();}}
function setTUI(rid,sid,run){const b=$('tb-'+rid+'-'+sid),c=$('card-'+rid+'-'+sid),d=$('td-'+rid+'-'+sid);if(b){b.textContent=run?'⏸':'▶';b.className=run?'ib ru':'ib pr';}if(c)c.classList.toggle('run',run);if(d)d.className=run?'tv ru':'tv';}
function setTD(rid,sid,rem,total){const d=$('td-'+rid+'-'+sid);if(d)d.textContent=fmt(rem);const p=$('tp-'+rid+'-'+sid);if(p)p.style.width=((total-rem)/total*100).toFixed(1)+'%';}

function updFT(){const ft=$('ft');if(!ft)return;if(!ATK){ft.classList.remove('v');return;}const t=TM[ATK];if(!t||!t.run){ft.classList.remove('v');return;}ft.classList.add('v');const l=$('ftl');if(l)l.textContent=t.lab;const tv=$('ftt');if(tv)tv.textContent=fmt(t.rem);const pb=$('ftpb');if(pb)pb.textContent=t.run?'⏸':'▶';}

function wDays(off){const now=new Date(),day=now.getDay(),mon=new Date(now);mon.setDate(now.getDate()-(day===0?6:day-1)+(off*7));return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});}
function dKey(d){return d.toISOString().slice(0,10);}
function rPlan(){

  const days=wDays(PO),wl=days[0].toLocaleDateString('fr-FR',{day:'numeric',month:'short'})+' – '+days[6].toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});
  $('ct').innerHTML='<div class="pw"><div class="wn"><button class="wb" onclick="PO--;rPlan()">← Avant</button><div class="wl">'+wl+'</div><button class="wb" onclick="PO++;rPlan()">Après →</button></div>'
    +'<button class="gsb" onclick="genShop()">🛒 Générer la liste de courses</button>'
    +days.map((d,i)=>{const dk=dKey(d),dp=PL[dk]||{},isT=dKey(new Date())===dk;
      return `<div class="db"><div class="dh"><div class="dn2" style="${isT?'color:var(--ac)':''}">${DNAMES[i]}</div><div class="dd">${d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</div></div><div class="ds">${SLOTS.map(s=>{const rid=dp[s],r=rid?getR(rid):null;return `<div class="slot${r?' f':''}" data-dk="${dk}" data-slot="${s}" onclick="pickSlot(this.dataset.dk,this.dataset.slot)"><span class="sll">${SLBL[s]}</span><span class="slc">${r?r.name:'+ Ajouter'}</span>${r?`<button class="slx" data-dk="${dk}" data-slot="${s}" onclick="event.stopPropagation();clrSlot(this.dataset.dk,this.dataset.slot)">×</button>`:''}</div>`;}).join('')}</div></div>`;}).join('')
    +'<div class="spc"></div></div>';
}
function pickSlot(dk,slot){showPicker(rid=>{if(!PL[dk])PL[dk]={};PL[dk][slot]=rid;scheduleSync();rPlan();});}
function clrSlot(dk,slot){if(PL[dk]){delete PL[dk][slot];scheduleSync();rPlan();}}
function genShop(){const days=wDays(PO);const rids=new Set();days.forEach(d=>{const dk=dKey(d);SLOTS.forEach(s=>{if(PL[dk]?.[s])rids.add(PL[dk][s]);});});if(!rids.size){alert('Aucune recette planifiée.');return;}rids.forEach(rid=>addToS(rid,CP[rid]||(getR(rid)?.portions||4)));sw('shopping');}

// ── SHOPPING ───────────────────────────────────────────────
function addToS(rid,portions){const r=getR(rid);if(!r)return;const ratio=portions/(r.portions||1);(r.ingredients||[]).forEach(ing=>{if(!ing.a)return;const qty=Math.round(ing.a*ratio*10)/10;const ex=SH.find(s=>s.name.toLowerCase()===ing.n.toLowerCase()&&s.unit===ing.u);if(ex)ex.qty=Math.round((ex.qty+qty)*10)/10;else SH.push({id:Date.now()+'_'+Math.random(),name:ing.n,qty,unit:ing.u||'',checked:false,source:r.name,cat:gIC(ing.n)});});scheduleSync();if(curTab==='shopping')rShop();}
function rShop(){
  $('tb').innerHTML='<div class="ttl">🛒 <em>Courses</em></div>';
  const all=[...SH,...MI.map(m=>({...m,cat:'Divers',isM:true}))];
  const groups={};all.forEach(item=>{const cat=item.cat||'Divers';if(!groups[cat])groups[cat]=[];groups[cat].push(item);});
  const unch=all.filter(i=>!i.checked).length;
  $('ct').innerHTML='<div class="shw"><div class="sa2"><button class="sb2 p" onclick="copyShop()">📋 Copier ('+unch+')</button><button class="sb2" onclick="uncheckAll()">Tout décocher</button><button class="sb2" onclick="clearChecked()">Suppr. cochés</button><button class="sb2" style="color:var(--red)" onclick="clearAllShop()">Vider</button></div>'
    +'<div class="sam"><input class="smi" id="sminput" placeholder="Ajouter un article…" onkeydown="if(event.key===\'Enter\')addManual()"><button class="sma" onclick="addManual()">+</button></div>'
    +(all.length?Object.entries(groups).map(([cat,items])=>`<div><div class="sgt">${cat}</div>${items.map(item=>`<div class="sit"><div class="sch${item.checked?' done':''}" data-id="${item.id}" data-ism="${item.isM?1:0}" onclick="togShop(this.dataset.id,this.dataset.ism=='1')">✓</div><div class="sin${item.checked?' done':''}">${item.name}${item.source?`<span style="font-size:10px;color:var(--k3)"> (${item.source})</span>`:''}</div><div class="siq">${item.qty?item.qty+(item.unit?' '+item.unit:''):''}</div><button class="sid" data-id="${item.id}" data-ism="${item.isM?1:0}" onclick="remShop(this.dataset.id,this.dataset.ism=='1')">×</button></div>`).join('')}</div>`).join('')
    :'<div class="sem">Liste vide 🛒</div>')
    +'<div class="spc"></div></div>';
}
function copyShop(){const text=[...SH,...MI].filter(i=>!i.checked).map(i=>(i.qty?i.qty+(i.unit?' '+i.unit:'')+'  ':'')+i.name).join('\n');navigator.clipboard?.writeText(text).then(()=>alert('Liste copiée !'));}
function togShop(id,isM){const list=isM?MI:SH;const item=list.find(i=>i.id==id);if(item){item.checked=!item.checked;scheduleSync();rShop();}}
function remShop(id,isM){if(isM)MI=MI.filter(i=>i.id!=id);else SH=SH.filter(i=>i.id!=id);scheduleSync();rShop();}
function addManual(){const inp=$('sminput'),text=inp?.value.trim();if(!text)return;MI.push({id:Date.now()+'_m',name:text,checked:false});inp.value='';scheduleSync();rShop();}
function uncheckAll(){SH.forEach(i=>i.checked=false);MI.forEach(i=>i.checked=false);scheduleSync();rShop();}
function clearChecked(){SH=SH.filter(i=>!i.checked);MI=MI.filter(i=>!i.checked);scheduleSync();rShop();}
function clearAllShop(){if(confirm('Vider toute la liste ?')){SH=[];MI=[];scheduleSync();rShop();}}

// ── ADD / EDIT RECIPE ──────────────────────────────────────
function rAdd(){
  const isE=!!EID,r=isE?CR.find(x=>x.id===EID):null;
  if(isE&&r){FI=r.ingredients.map(i=>({...i}));FS=r.steps.map(s=>({...s,timer:s.timer||''}));FT=[...(r.tags||[])];FL=r.lifestyle||'';FM={k:r.macros?.kcal||'',p:r.macros?.prot||'',g:r.macros?.gluc||'',l:r.macros?.lip||''};}
  else if(!isE){FI=[{a:'',u:'g',n:''}];FS=[{t:'',timer:'',d:''}];FT=[];FL='';FM={k:'',p:'',g:'',l:''};}
  $('tb').innerHTML=`<div class="ttl">${isE?'✏️ Modifier':'✚ <em>Recette</em>'}</div>`;
  $('ct').innerHTML=`<div class="aw">
  ${!isE?`<div class="imp"><div class="impt">✨ Import via Claude</div><div style="font-size:12px;color:var(--ad);line-height:1.6;margin-bottom:8px">1. Envoie photo ou lien à Claude · 2. Copie le prompt <span style="cursor:pointer;color:var(--ac);font-weight:700" onclick="copyPr()">📋</span> · 3. Colle le JSON</div><textarea class="imta" id="jimput" placeholder='{"name":"..."}'></textarea><button class="impb" onclick="impJ()">Charger →</button><div id="impst" class="imps" style="display:none"></div></div>`:''}
  <div class="fg"><label class="fl">Nom *</label><input class="fi" id="fn" value="${r?.name||''}" placeholder="Ex: Gratin dauphinois"></div>
  <div class="fr"><div class="fg"><label class="fl">Catégorie</label><select class="fsl" id="fcat">${CATS.map(c=>`<option value="${c}"${(r?.cat||'Pain')===c?' selected':''}>${CI[c]} ${c}</option>`).join('')}</select></div>
  <div class="fg"><label class="fl">Difficulté</label><select class="fsl" id="fdiff">${['Facile','Moyen','Difficile'].map(d=>`<option${(r?.difficulty||'Facile')===d?' selected':''}>${d}</option>`).join('')}</select></div></div>
  <div class="fr"><div class="fg"><label class="fl">Portions</label><input class="fi" id="fpor" type="number" min="1" value="${r?.portions||4}"></div><div class="fg"><label class="fl">Prép. (min)</label><input class="fi" id="fprep" type="number" value="${r?.prepTime||''}"></div><div class="fg"><label class="fl">Cuisson (min)</label><input class="fi" id="fck" type="number" value="${r?.cookTime||''}"></div></div>
  <div class="fg"><label class="fl">Description</label><textarea class="fta" id="fdesc">${r?.desc||''}</textarea></div>
  <div class="fg"><label class="fl">Style de vie</label><div class="lf">${Object.keys(LFS).map(lf=>`<button class="lc${FL===lf?' on':''}" data-lf="${lf}" onclick="setLF(this.dataset.lf)">${LFS[lf]} ${lf}</button>`).join('')}</div></div>
  <div class="fg"><label class="fl">Macros / portion</label><div class="mf"><div class="mw"><div class="ml2">kcal</div><input class="mi" id="fk" type="number" value="${FM.k}" oninput="FM.k=this.value" placeholder="0"></div><div class="mw"><div class="ml2">Prot. g</div><input class="mi" id="fp2" type="number" value="${FM.p}" oninput="FM.p=this.value" placeholder="0"></div><div class="mw"><div class="ml2">Gluc. g</div><input class="mi" id="fg2" type="number" value="${FM.g}" oninput="FM.g=this.value" placeholder="0"></div><div class="mw"><div class="ml2">Lip. g</div><input class="mi" id="fl2" type="number" value="${FM.l}" oninput="FM.l=this.value" placeholder="0"></div></div></div>
  <div class="fg"><label class="fl">Tags</label><div class="tg">${TAGS.map(t=>`<button class="tc${FT.includes(t)?' on':''}" data-tag="${t}" onclick="togFT(this.dataset.tag)">${t}</button>`).join('')}</div></div>
  <div class="fg"><label class="fl">Ingrédients</label><div id="inglist">${FI.map((ing,i)=>mkIRow(ing,i)).join('')}</div><button class="arb" onclick="addIng()">+ Ingrédient</button></div>
  <div class="fg"><label class="fl">Étapes</label><div id="stlist">${FS.map((s,i)=>mkSRow(s,i)).join('')}</div><button class="arb" onclick="addSt()">+ Étape</button></div>
  <div class="fg"><label class="fl">Notes (une par ligne)</label><textarea class="fta" id="fnotes">${(r?.notes||[]).join('\n')}</textarea></div>
  <button class="sub" onclick="saveR()">${isE?'Enregistrer':'Créer la recette'}</button>
  ${isE?`<button class="del" data-rid="${r.id}" onclick="delR(this.dataset.rid)">Supprimer</button>`:''}
  <div class="spc"></div></div>`;
}
function mkIRow(ing,i){return `<div class="di"><input class="fi" style="width:60px;flex:none" placeholder="Qté" value="${ing.a||''}" data-idx="${i}" oninput="FI[parseInt(this.dataset.idx)].a=this.value"><select class="fsl" style="width:68px;flex:none" data-idx="${i}" onchange="FI[parseInt(this.dataset.idx)].u=this.value">${UNITS.map(u=>`<option${ing.u===u?' selected':''}>${u}</option>`).join('')}</select><input class="fi" placeholder="Ingrédient" value="${ing.n||''}" data-idx="${i}" oninput="FI[parseInt(this.dataset.idx)].n=this.value"><button class="dr" data-idx="${i}" onclick="remIng(parseInt(this.dataset.idx))">×</button></div>`;}
function mkSRow(s,i){return `<div style="border:1px solid var(--bdr);border-radius:12px;padding:12px;margin-bottom:8px"><div class="fr"><div class="fg" style="flex:2"><input class="fi" placeholder="Titre" value="${s.t||''}" data-idx="${i}" oninput="FS[parseInt(this.dataset.idx)].t=this.value"></div><div class="fg" style="flex:1"><input class="fi" placeholder="Durée (sec)" type="number" value="${s.timer||''}" data-idx="${i}" oninput="FS[parseInt(this.dataset.idx)].timer=this.value?parseInt(this.value):null"></div><button class="dr" data-idx="${i}" onclick="remSt(parseInt(this.dataset.idx))" style="align-self:center">×</button></div><textarea class="fta" style="min-height:52px;margin-top:8px" placeholder="Description…" data-idx="${i}" oninput="FS[parseInt(this.dataset.idx)].d=this.value">${s.d||''}</textarea></div>`;}
function setLF(lf){FL=FL===lf?'':lf;rAdd();}
function togFT(t){if(FT.includes(t))FT=FT.filter(x=>x!==t);else FT.push(t);rAdd();}
function addIng(){FI.push({a:'',u:'g',n:''});$('inglist').innerHTML=FI.map((ing,i)=>mkIRow(ing,i)).join('');}
function remIng(i){FI.splice(i,1);$('inglist').innerHTML=FI.map((ing,i)=>mkIRow(ing,i)).join('');}
function addSt(){FS.push({t:'',timer:'',d:''});$('stlist').innerHTML=FS.map((s,i)=>mkSRow(s,i)).join('');}
function remSt(i){FS.splice(i,1);$('stlist').innerHTML=FS.map((s,i)=>mkSRow(s,i)).join('');}
function saveR(){
  const name=$('fn')?.value.trim();if(!name){alert('Nom obligatoire.');return;}
  const cat=$('fcat')?.value,diff=$('fdiff')?.value;
  const prep=parseInt($('fprep')?.value)||0,ck=parseInt($('fck')?.value)||0;
  const nr={id:EID||(Date.now()+''),isCustom:true,cat,name,fullName:name,tag:cat+' · '+diff,desc:$('fdesc')?.value||'',portions:parseInt($('fpor')?.value)||4,prepTime:prep,cookTime:ck,difficulty:diff,tags:[...FT],lifestyle:FL||null,macros:{kcal:parseInt(FM.k)||0,prot:parseInt(FM.p)||0,gluc:parseInt(FM.g)||0,lip:parseInt(FM.l)||0},meta:[{v:(prep+ck)?prep+ck+'min':'–',l:'Durée'},{v:cat,l:'Type'},{v:diff,l:'Niveau'}],ingredients:FI.filter(i=>i.n).map(i=>({a:i.a?parseFloat(i.a):null,u:i.u||'g',n:i.n})),steps:FS.filter(s=>s.t).map((s,j)=>({id:'s'+(j+1),t:s.t,timer:s.timer||null,d:s.d||''})),notes:($('fnotes')?.value||'').split('\n').filter(Boolean),ratio:null};
  if(EID){const idx=CR.findIndex(r=>r.id===EID);if(idx>=0)CR[idx]=nr;}else CR.push(nr);
  scheduleSync();EID=null;FI=[{a:'',u:'g',n:''}];FS=[{t:'',timer:'',d:''}];FT=[];FL='';FM={k:'',p:'',g:'',l:''};sw('home');
}
function editR(rid){EID=rid;curRid=null;$('tb').style.display='';sw('add');}
function delR(rid){if(!confirm('Supprimer ?'))return;CR=CR.filter(r=>r.id!==rid);scheduleSync();EID=null;sw('home');}

// Import via Claude
function copyPr(){const p='Génère uniquement le JSON brut (sans markdown) : {"name":"","cat":"Pain","desc":"","portions":4,"prepTime":0,"cookTime":0,"difficulty":"Facile","lifestyle":"Healthy","macros":{"kcal":0,"prot":0,"gluc":0,"lip":0},"tags":[],"ingredients":[{"amount":0,"unit":"g","name":""}],"steps":[{"title":"","timer":null,"desc":""}],"notes":[]}';navigator.clipboard?.writeText(p).then(()=>setIS('✅ Prompt copié !'));}
function setIS(msg,err){const el=$('impst');if(!el)return;el.style.display=msg?'block':'none';el.textContent=msg;el.className='imps'+(err?' err':'');}
function impJ(){const raw=$('jimput')?.value.trim();if(!raw){alert('Colle un JSON');return;}try{fillF(JSON.parse(raw));setIS('✅ Recette chargée — vérifie et enregistre !');}catch(e){setIS('❌ JSON invalide',true);}}
function fillF(rcp){
  if(!rcp)return;
  if(rcp.name&&$('fn'))$('fn').value=rcp.name;
  if(rcp.cat&&$('fcat')){const o=[...$('fcat').options].find(op=>op.value===rcp.cat);if(o)$('fcat').value=rcp.cat;}
  if(rcp.difficulty&&$('fdiff'))$('fdiff').value=rcp.difficulty;
  if(rcp.portions&&$('fpor'))$('fpor').value=rcp.portions;
  if(rcp.prepTime&&$('fprep'))$('fprep').value=rcp.prepTime;
  if(rcp.cookTime&&$('fck'))$('fck').value=rcp.cookTime;
  if(rcp.desc&&$('fdesc'))$('fdesc').value=rcp.desc;
  if(rcp.lifestyle)FL=rcp.lifestyle;
  if(rcp.macros)FM={k:rcp.macros.kcal||'',p:rcp.macros.prot||'',g:rcp.macros.gluc||'',l:rcp.macros.lip||''};
  if(rcp.tags)FT=(rcp.tags||[]).filter(t=>TAGS.includes(t));
  const ings=rcp.ingredients||[];if(ings.length)FI=ings.map(i=>({a:i.amount||i.a||'',u:i.unit||i.u||'g',n:i.name||i.n||''}));
  const steps=rcp.steps||[];if(steps.length)FS=steps.map(s=>({t:s.title||s.t||'',timer:s.timer||'',d:s.desc||s.d||''}));
  if(rcp.notes&&$('fnotes'))$('fnotes').value=(rcp.notes||[]).join('\n');
  $('inglist').innerHTML=FI.map((ing,i)=>mkIRow(ing,i)).join('');
  $('stlist').innerHTML=FS.map((s,i)=>mkSRow(s,i)).join('');
  rAdd();
}

// ── MODALS ─────────────────────────────────────────────────
function showPicker(cb){
  const mo=$('mo'),sh=$('msh');let q='';
  const rl=()=>{const f=allR().filter(r=>!q||r.name.toLowerCase().includes(q.toLowerCase()));
    sh.innerHTML=`<div class="mhd"><div class="mt">Choisir une recette</div><button class="mx" onclick="closeM()">× Fermer</button></div><div class="msrch"><div class="sr"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input style="border:none;outline:none;font-size:14px;font-family:Inter,sans-serif;color:var(--ink);background:transparent;width:100%" placeholder="Rechercher…" oninput="mQ(this.value)"></div></div><div class="mlist">${f.map(r=>`<div class="mitm" data-rid="${r.id}" onclick="pickR(this.dataset.rid)"><div class="mbar" style="background:${CC[r.cat]||'#888'}"></div><div><div class="mname">${r.name}</div><div class="mcat">${CI[r.cat]} ${r.cat}</div></div></div>`).join('')}</div>`;};
  window._pcb=cb;window.mQ=(v)=>{q=v;rl();};window.pickR=(rid)=>{closeM();window._pcb(rid);};rl();mo.classList.add('open');
}
function closeM(){$('mo').classList.remove('open');}
$('mo').addEventListener('click',e=>{if(e.target===$('mo'))closeM();});

// ── EXPORT / IMPORT MANUEL ─────────────────────────────────
function openExp(){$('expta').style.display='none';$('expta').value='';$('expm').classList.add('open');}
function closeExp(){$('expm').classList.remove('open');}
function doExport(){
  const json=JSON.stringify(getState());
  if(navigator.share){navigator.share({title:'Mon Carnet',text:json}).catch(()=>fallbackCopy(json));}
  else fallbackCopy(json);
}
function fallbackCopy(text){navigator.clipboard?.writeText(text).then(()=>alert('Données copiées !')).catch(()=>{$('expta').style.display='block';$('expta').value=text;});}
function showImport(){
  $('expta').style.display='block';
  const txt=$('expta').value.trim();if(!txt)return;
  try{applyState(JSON.parse(txt));closeExp();render();alert('Import réussi !');}catch{alert('Format invalide.');}
}
$('expm').addEventListener('click',e=>{if(e.target===$('expm'))closeExp();});

// ── INIT ───────────────────────────────────────────────────
ghGet();
render();

</script>
</body>
</html>
