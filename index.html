<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F2F2F7; --card: #FFFFFF; --sur: #FAFAFC; --bdr: rgba(0,0,0,.07);
  --ink: #1C1C1E; --k2: #48484A; --k3: #8E8E93;

  --nav: 60px;
}
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
#tb { flex-shrink: 0; background: var(--bg); height: var(--st); min-height: 0; z-index: 10; }
#ct { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
#bn { flex-shrink: 0; background: var(--card); border-top: 1px solid var(--bdr); display: flex; height: calc(var(--nav) + var(--sb)); padding-bottom: var(--sb); z-index: 20; }
.tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; border: none; background: none; font-family: 'Inter', sans-serif; color: var(--k3); font-size: 10px; font-weight: 600; position: relative; -webkit-tap-highlight-color: transparent; transition: color .15s; }
.tab:active { opacity: .6; }
.tab.on { color: var(--ac); }
.tab::after { content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%) scaleX(0); width: 22px; height: 3px; background: var(--ac); border-radius: 2px; transition: transform .2s; }
.tab.on::after { transform: translateX(-50%) scaleX(1); }
.hd-btn { width: 34px; height: 34px; border-radius: 10px; border: none; background: var(--card); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--k2); box-shadow: var(--sh); flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
.hd-btn:active { opacity: .7; }
.sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--k3); flex-shrink: 0; }

.sync-dot.er { background: var(--red); }
.sw { padding: 14px 20px 14px; }

function beep(){try{var c=new(window.AudioContext||window.webkitAudioContext)();[0,.3,.6].forEach(function(t){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;g.gain.setValueAtTime(.4,c.currentTime+t);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+t+.25);o.start(c.currentTime+t);o.stop(c.currentTime+t+.25);});}catch(e){}}
function startT(rid,sid,total){
  var k=tk(rid,sid);if(!TM[k])TM[k]={rem:total,total:total,iv:null,run:false,lab:'',rid:rid,sid:sid};
  var t=TM[k];var r=getR(rid);var s=(r?r.steps||[]:[]).find(function(x){return x.id===sid;});
  t.lab=(r?r.name:'')+(s?' · '+s.t:'');
  if(t.run){clearInterval(t.iv);t.run=false;setTUI(rid,sid,false);if(ATK===k){ATK=null;updFT();}}
  else{t.run=true;ATK=k;setTUI(rid,sid,true);updFT();
    t.iv=setInterval(function(){t.rem=Math.max(0,t.rem-1);setTD(rid,sid,t.rem,t.total);if(ATK===k)updFT();if(CRid===rid&&CCS&&CCS.id===sid)updCT();
      if(t.rem===0){clearInterval(t.iv);t.run=false;tEnd(rid,sid);if(ATK===k){ATK=null;updFT();}}},1000);}
}

function setTD(rid,sid,rem,total){var d=$('td-'+rid+'-'+sid);if(d)d.textContent=fmt(rem);var p=$('tp-'+rid+'-'+sid);if(p)p.style.width=((total-rem)/total*100).toFixed(1)+'%';}

function updFT(){var ft=$('ft');if(!ft)return;if(!ATK){ft.classList.remove('v');return;}var t=TM[ATK];if(!t||!t.run){ft.classList.remove('v');return;}ft.classList.add('v');var l=$('ffl');if(l)l.textContent=t.lab;var tv=$('fft');if(tv)tv.textContent=fmt(t.rem);}

// ── STEPS
function mkStep(rid,step,idx){

  var tH=step.timer?'<div class="tw"><span class="tv" id="td-'+rid+'-'+step.id+'">'+fmt(step.timer)+'</span><button class="ib pr" id="tb-'+rid+'-'+step.id+'" data-rid="'+rid+'" data-sid="'+step.id+'" data-tot="'+step.timer+'" onclick="startT(this.dataset.rid,this.dataset.sid,parseInt(this.dataset.tot))"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg></button><button class="ib" data-rid="'+rid+'" data-sid="'+step.id+'" data-tot="'+step.timer+'" onclick="resetT(this.dataset.rid,this.dataset.sid,parseInt(this.dataset.tot))"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg></button></div>':'';
  var nentries=notes.map(function(n,i){return'<div class="note-entry"><span class="note-date">'+n.date+'</span><span class="note-text">'+n.text+'</span><button class="note-del" data-rid="'+rid+'" data-sid="'+step.id+'" data-i="'+i+'" onclick="delN(this.dataset.rid,this.dataset.sid,parseInt(this.dataset.i))"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></button></div>';}).join('');
  return'<div class="step-card'+(done?' done':'')+'" id="card-'+rid+'-'+step.id+'">'

    +'<div class="step-acts">'+tH+'<button class="ib'+(done?' dn':'')+'" id="chk-'+rid+'-'+step.id+'" data-rid="'+rid+'" data-sid="'+step.id+'" data-idx="'+(idx+1)+'" onclick="togSD(this.dataset.rid,this.dataset.sid,parseInt(this.dataset.idx))"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></button></div>'
    +'</div><div class="step-desc">'+step.d+'</div></div>'

    +'<div class="step-notes'+(notes.length?' open':'')+'" id="nzone-'+rid+'-'+step.id+'">'
    +'<div id="nlist-'+rid+'-'+step.id+'">'+nentries+'</div>'
    +'<div class="note-add"><input class="note-input" id="ninput-'+rid+'-'+step.id+'" placeholder="Ajouter une note…" data-rid="'+rid+'" data-sid="'+step.id+'" onkeydown="if(event.key===\'Enter\')addN(this.dataset.rid,this.dataset.sid,this)"><button class="note-save" data-rid="'+rid+'" data-sid="'+step.id+'" onclick="addN(this.dataset.rid,this.dataset.sid,$(\'ninput-\'+this.dataset.rid+\'-\'+this.dataset.sid))">OK</button></div>'

function togSD(rid,sid,num){var k=tk(rid,sid);SD[k]=!SD[k];scheduleSync();var c=$('card-'+rid+'-'+sid);if(c)c.classList.toggle('done',SD[k]);var n=$('snum-'+rid+'-'+sid);if(n)n.textContent=SD[k]?'✓':num;var b=$('chk-'+rid+'-'+sid);if(b)b.className=SD[k]?'ib dn':'ib';}
function togN(rid,sid){var z=$('nzone-'+rid+'-'+sid);if(z)z.classList.toggle('open');}
function addN(rid,sid,input){var text=input?input.value.trim():'';if(!text)return;var k=tk(rid,sid);if(!SN[k])SN[k]=[];SN[k].push({text:text,date:today()});input.value='';scheduleSync();rfN(rid,sid);}

var pendJPRid=null;
function openJP(rid){pendJPRid=rid;$('jpi').click();}
function handleJP(input){var file=input.files?input.files[0]:null;if(!file||!pendJPRid)return;var rid=pendJPRid;var reader=new FileReader();reader.onload=function(e){addJE(rid,'',e.target.result);};reader.readAsDataURL(file);input.value='';}

function delJE(rid,idx){JN[rid].splice(idx,1);scheduleSync();renderJ(rid);}

async function shareR(rid){var r=getR(rid);if(!r)return;var text=r.name+'\n\n'+(r.desc||'')+'\n\nIngrédients :\n'+(r.ingredients||[]).map(function(i){return'• '+(i.a||'')+(i.u?' '+i.u:'')+' '+i.n;}).join('\n');if(navigator.share)try{await navigator.share({title:r.name,text:text});return;}catch(e){}if(navigator.clipboard)navigator.clipboard.writeText(text).then(function(){alert('Recette copiée !');});}

// ── PLANNER
var PO=0;
var SLOTS=['matin','midi','soir'],SLBL={matin:'Matin',midi:'Midi',soir:'Soir'};
var DNAMES=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
function wDays(off){var now=new Date(),day=now.getDay(),mon=new Date(now);mon.setDate(now.getDate()-(day===0?6:day-1)+(off*7));return Array.from({length:7},function(_,i){var d=new Date(mon);d.setDate(mon.getDate()+i);return d;});}
function dKey(d){return d.toISOString().slice(0,10);}
function rPlan(){
  var days=wDays(PO);
  var wl=days[0].toLocaleDateString('fr-FR',{day:'numeric',month:'short'})+' – '+days[6].toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});
  var html='<div class="planner-wrap"><div class="week-nav"><button class="week-btn" onclick="PO--;rPlan()">← Avant</button><div class="week-label">'+wl+'</div><button class="week-btn" onclick="PO++;rPlan()">Après →</button></div>';
  html+='<button class="gen-shop-btn" onclick="genShop()">Générer la liste de courses</button>';
  var todayKey=dKey(new Date());
  days.forEach(function(d,i){
    var dk=dKey(d),dp=PL[dk]||{},isT=dk===todayKey;
    html+='<div class="day-block"><div class="day-hd"><div class="day-name"'+(isT?' style="color:var(--ac)"':'')+'>'+DNAMES[i]+'</div><div class="day-date">'+d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})+'</div></div><div class="day-slots">';
    SLOTS.forEach(function(slot){
      var rid=dp[slot],r=rid?getR(rid):null;
      html+='<div class="slot'+(r?' f':'')+'" data-dk="'+dk+'" data-slot="'+slot+'" onclick="pickSlot(this.dataset.dk,this.dataset.slot)"><span class="slot-lbl">'+SLBL[slot]+'</span><span class="slot-content">'+(r?r.name:'+ Ajouter')+'</span>'+(r?'<button class="slot-clear" data-dk="'+dk+'" data-slot="'+slot+'" onclick="event.stopPropagation();clrSlot(this.dataset.dk,this.dataset.slot)">×</button>':'')+'</div>';
    });
    html+='</div></div>';
  });
  html+='<div class="spc"></div></div>';
  $('ct').innerHTML=html;
}
function pickSlot(dk,slot){showPicker(function(rid){if(!PL[dk])PL[dk]={};PL[dk][slot]=rid;scheduleSync();rPlan();});}
function clrSlot(dk,slot){if(PL[dk]){delete PL[dk][slot];scheduleSync();rPlan();}}
function genShop(){var days=wDays(PO);var ridCounts=new Map();days.forEach(function(d){var dk=dKey(d);SLOTS.forEach(function(s){if(PL[dk]&&PL[dk][s]){var rid=PL[dk][s];ridCounts.set(rid,(ridCounts.get(rid)||0)+1);}});});if(!ridCounts.size){alert('Aucune recette planifiée.');return;}ridCounts.forEach(function(count,rid){var base=CP[rid]||(getR(rid)?getR(rid).portions||4:4);addToS(rid,base*count);});sw('shopping');}

// ── SHOPPING
function addToS(rid,portions){var r=getR(rid);if(!r)return;var ratio=portions/(r.portions||1);(r.ingredients||[]).forEach(function(ing){if(!ing.a)return;var qty=Math.round(ing.a*ratio*10)/10;var ex=SH.find(function(s){return s.name.toLowerCase()===ing.n.toLowerCase()&&s.unit===ing.u;});if(ex)ex.qty=Math.round((ex.qty+qty)*10)/10;else SH.push({id:Date.now()+'_'+Math.random(),name:ing.n,qty:qty,unit:ing.u||'',checked:false,source:r.name,cat:gIC(ing.n)});});scheduleSync();if(curTab==='shopping')rShop();}
function rShop(){
  var all=SH.concat(MI.map(function(m){return Object.assign({},m,{cat:'Divers',isM:true});}));
  var groups={};all.forEach(function(item){var cat=item.cat||'Divers';if(!groups[cat])groups[cat]=[];groups[cat].push(item);});
  var unch=all.filter(function(i){return!i.checked;}).length;
  var html='<div class="shop-wrap">';
  html+='<div class="shop-actions"><button class="shop-btn p" onclick="copyShop()">Copier ('+unch+')</button><button class="shop-btn" onclick="uncheckAll()">Décocher</button><button class="shop-btn" onclick="clearChecked()">Suppr. cochés</button><button class="shop-btn" style="color:var(--red)" onclick="clearAllShop()">Vider</button></div>';
  html+='<div class="shop-add-row"><input class="shop-input" id="sminput" placeholder="Ajouter un article…" onkeydown="if(event.key===\'Enter\')addManual()"><button class="shop-add-btn" onclick="addManual()">+</button></div>';
  if(all.length){
    Object.entries(groups).forEach(function(entry){
      var cat=entry[0],items=entry[1];
      html+='<div class="shop-group"><div class="shop-group-title">'+cat+'</div>';
      items.forEach(function(item){
        html+='<div class="shop-item"><div class="shop-chk'+(item.checked?' done':'')+'" data-id="'+item.id+'" data-ism="'+(item.isM?1:0)+'" onclick="togShop(this.dataset.id,this.dataset.ism===\'1\')">'+(item.checked?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>':'')+'</div>';
        html+='<div class="shop-name'+(item.checked?' done':'')+'">'+item.name+(item.source?'<span style="font-size:10px;color:var(--k3)"> · '+item.source+'</span>':'')+'</div>';
        html+='<div class="shop-qty">'+(item.qty?item.qty+(item.unit?' '+item.unit:''):'')+'</div>';
        html+='<button class="shop-del" data-id="'+item.id+'" data-ism="'+(item.isM?1:0)+'" onclick="remShop(this.dataset.id,this.dataset.ism===\'1\')">×</button></div>';
      });
      html+='</div>';
    });
  }else{html+='<div class="shop-empty">Liste vide</div>';}
  html+='<div class="spc"></div></div>';
  $('ct').innerHTML=html;
}
function copyShop(){var text=SH.concat(MI).filter(function(i){return!i.checked;}).map(function(i){return(i.qty?i.qty+(i.unit?' '+i.unit:'')+'  ':'')+i.name;}).join('\n');if(navigator.clipboard)navigator.clipboard.writeText(text).then(function(){alert('Liste copiée !');});}
function togShop(id,isM){var list=isM?MI:SH;var item=list.find(function(i){return i.id==id;});if(item){item.checked=!item.checked;scheduleSync();rShop();}}
function remShop(id,isM){if(isM)MI=MI.filter(function(i){return i.id!=id;});else SH=SH.filter(function(i){return i.id!=id;});scheduleSync();rShop();}
function addManual(){var inp=$('sminput'),text=inp?inp.value.trim():'';if(!text)return;MI.push({id:Date.now()+'_m',name:text,checked:false});inp.value='';scheduleSync();rShop();}
function uncheckAll(){SH.forEach(function(i){i.checked=false;});MI.forEach(function(i){i.checked=false;});scheduleSync();rShop();}
function clearChecked(){SH=SH.filter(function(i){return!i.checked;});MI=MI.filter(function(i){return!i.checked;});scheduleSync();rShop();}
function clearAllShop(){if(confirm('Vider toute la liste ?')){SH=[];MI=[];scheduleSync();rShop();}}

// ── THEMEALDB
var MDB_BASE='https://www.themealdb.com/api/json/v1/1/';
var MDB_CAT={Vegetarian:'Légumes',Vegan:'Légumes',Chicken:'Viande',Beef:'Viande',Pork:'Viande',Lamb:'Viande',Seafood:'Poisson',Dessert:'Dessert',Breakfast:'Viennoiserie',Pasta:'Pâte',Side:'Légumes',Starter:'Salade',Miscellaneous:'Sauce',Goat:'Viande'};
var mdbMeals=[],mdbSel=new Set();
function normMeal(m){
  // ── Parser de mesures (fractions, entiers, décimaux)
  function parseMeas(raw){
    var s=(raw||'').trim().replace(/\s+to\s+[\d\/\s]+.*/i,'').trim();
    var n=0,rest=s;
    var rxMixed=/^(\d+)\s+(\d+)\/(\d+)\s*/;
    var rxFrac=/^(\d+)\/(\d+)\s*/;
    var rxNum=/^([\d]+(?:[.,]\d+)?)\s*/;
    var mm;
    if((mm=s.match(rxMixed))){n=+mm[1]+(+mm[2])/(+mm[3]);rest=s.slice(mm[0].length);}
    else if((mm=s.match(rxFrac))){n=(+mm[1])/(+mm[2]);rest=s.slice(mm[0].length);}
    else if((mm=s.match(rxNum))){n=parseFloat(mm[1].replace(',','.'));rest=s.slice(mm[0].length);}
    return{n:n||null,u:rest.trim()};
  }
  // ── Conversion impérial → métrique + labels français
  var VOL={cup:240,cups:240,c:240,tablespoon:15,tablespoons:15,tbsp:15,tbs:15,tb:15,teaspoon:5,teaspoons:5,tsp:5,ts:5,'fl oz':30,'fluid oz':30,'fluid ounce':30,'fluid ounces':30,pint:473,pints:473,pt:473,quart:946,quarts:946,qt:946,gallon:3785,gallons:3785};
  var WGT={pound:454,pounds:454,lb:454,lbs:454,oz:28,ounce:28,ounces:28,stick:113,sticks:113};
  var FR={g:'g',gram:'g',grams:'g',kg:'kg',ml:'ml',l:'l',cl:'cl',dl:'dl',mg:'mg',pinch:'pincée',pinches:'pincée',handful:'poignée',handfuls:'poignée',bunch:'botte',bunches:'bottes',sprig:'brin',sprigs:'brins',clove:'gousse',cloves:'gousses',slice:'tranche',slices:'tranches',piece:'pièce',pieces:'pièces',can:'boîte',cans:'boîtes',tin:'boîte',tins:'boîtes',jar:'bocal',jars:'bocaux',package:'sachet',packages:'sachets',bag:'sachet',bags:'sachets',sheet:'feuille',sheets:'feuilles',drop:'goutte',drops:'gouttes','to taste':'qsp','as needed':'qsp','au goût':'qsp'};
  var SKIP={large:1,medium:1,small:1,whole:1,fresh:1,dried:1,ground:1,chopped:1,sliced:1,diced:1};
  function toMetric(n,u){
    var ul=(u||'').toLowerCase().trim().replace(/\.$/,'');
    if(VOL[ul]!==undefined)return{a:Math.round((n||1)*VOL[ul]),u:'ml'};
    if(WGT[ul]!==undefined)return{a:Math.round((n||1)*WGT[ul]),u:'g'};
    if(FR[ul]!==undefined)return{a:n||null,u:FR[ul]};
    if(SKIP[ul])return{a:n||null,u:''};
    // Unité inconnue : garder telle quelle
    return{a:n||null,u:u};
  }
  // ── Ingrédients
  var ings=[];
  for(var i=1;i<=20;i++){
    var ing=m['strIngredient'+i],raw=(m['strMeasure'+i]||'').trim();
    if(!ing||!ing.trim())continue;
    var p=parseMeas(raw);
    var cv=toMetric(p.n,p.u);
    ings.push({a:cv.a,u:cv.u,n:ing.trim()});
  }
  // ── Étapes (texte anglais TheMealDB — non traduisible sans API)
  var rawSteps=(m.strInstructions||'').split(/\r?\n+/).filter(function(s){return s.trim().length>15;}).slice(0,12);
  var steps=rawSteps.map(function(s,i){return{id:'s'+(i+1),t:'Étape '+(i+1),timer:null,d:s.trim()};});
  if(!steps.length)steps=[{id:'s1',t:'Préparation',timer:null,d:m.strInstructions||''}];
  var cat=MDB_CAT[m.strCategory]||'Légumes';
  var tags=['MealDB'];if(m.strCategory==='Vegetarian'||m.strCategory==='Vegan')tags.push('Végétarien');
  if(m.strTags)m.strTags.split(',').forEach(function(t){if(t.trim()&&tags.length<6)tags.push(t.trim());});
  var lf=(m.strCategory==='Vegetarian'||m.strCategory==='Vegan')?'Healthy':null;
  return{id:'mdb_'+m.idMeal,isCustom:true,cat:cat,name:m.strMeal,fullName:m.strMeal,desc:(m.strCategory||'')+(m.strArea?' · '+m.strArea:''),portions:4,prepTime:20,cookTime:25,difficulty:'Moyen',tags:tags,lifestyle:lf,macros:{kcal:0,prot:0,gluc:0,lip:0},meta:[{v:'45min',l:'Durée'},{v:m.strArea||'Monde',l:'Cuisine'},{v:m.strCategory||'',l:'Type'}],ingredients:ings,steps:steps,notes:[],ratio:null,source:'TheMealDB'};
}

    var foot=document.getElementById('mdb-foot');if(foot){foot.style.display='flex';foot.innerHTML='<button class="mdb-cancel-btn" onclick="openMDB()">← Retour</button><button class="mdb-import-btn" id="mdb-imp" onclick="doImportMDB()" disabled>Importer (0)</button>';}
  }).catch(function(){body.innerHTML='<div style="padding:20px;text-align:center;color:var(--red)">Erreur de chargement.</div>';});
}
function togMDB(i){mdbSel.has(i)?mdbSel.delete(i):mdbSel.add(i);var chk=document.getElementById('mchk-'+i);if(chk)chk.className='mdb-check'+(mdbSel.has(i)?' on':'');var btn=document.getElementById('mdb-imp');if(btn){btn.textContent='Importer ('+mdbSel.size+')';btn.disabled=mdbSel.size===0;}}
async function doImportMDB(){
  if(!mdbSel.size)return;
  var btn=document.getElementById('mdb-imp');if(btn){btn.disabled=true;btn.textContent='Import…';}
  var foot=document.getElementById('mdb-foot');if(foot){var pb=document.createElement('div');pb.className='mdb-progress';pb.style.margin='8px 0 0';var pf=document.createElement('div');pf.className='mdb-progress-fill';pb.appendChild(pf);foot.insertBefore(pb,foot.firstChild);}
  var ids=Array.from(mdbSel),imported=0;
  for(var ii=0;ii<ids.length;ii++){var meal=mdbMeals[ids[ii]];try{var res=await fetch(MDB_BASE+'lookup.php?i='+meal.idMeal);var data=await res.json();var full=data.meals&&data.meals[0];if(full){var nr=normMeal(full);var ex=CR.findIndex(function(x){return x.id===nr.id;});if(ex>=0)CR[ex]=nr;else CR.push(nr);imported++;}}catch(e){}var pf2=document.querySelector('.mdb-progress-fill');if(pf2)pf2.style.width=((ii+1)/ids.length*100)+'%';await new Promise(function(resolve){setTimeout(resolve,200);});}
  persist();scheduleSync();closeMDB();HF={cat:'Tout',tag:'',q:'',homeCat:null};curView='list';fromDash=false;render();
}
